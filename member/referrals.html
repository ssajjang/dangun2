<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DANGUN - 회원 추천 트리</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    .tree-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    /* Canvas Tree */
    .tree-canvas-wrapper {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      overflow: hidden;
      cursor: grab;
    }
    .tree-canvas-wrapper:active { cursor: grabbing; }

    #treeCanvas {
      display: block;
      width: 100%;
      touch-action: none;
    }

    .tree-legend {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }

    /* Member List Table */
    .member-card {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .member-avatar-sm {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--gradient-gold);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #1a1a2e;
      flex-shrink: 0;
    }

    /* Node Tooltip */
    .node-tooltip {
      position: absolute;
      background: var(--bg-card);
      border: 1px solid rgba(212,160,23,0.4);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      font-size: 12px;
      pointer-events: none;
      z-index: 100;
      box-shadow: var(--shadow-lg);
      min-width: 180px;
      display: none;
    }
    .node-tooltip.show { display: block; }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="app-wrapper">
    <aside class="sidebar">
      <div class="sidebar-header">
        <a class="sidebar-logo" href="index.html">
          <div class="logo-icon">D</div>
          <div class="logo-text">
            <span class="logo-name">DANGUN</span>
            <span class="logo-sub">Financial Platform</span>
          </div>
        </a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">회원 메뉴</div>
        <a class="nav-item" href="index.html"><span class="nav-icon"><i class="fas fa-home"></i></span> 대시보드</a>
        <a class="nav-item" href="payouts.html"><span class="nav-icon"><i class="fas fa-coins"></i></span> 투자금 지급내역</a>
        <a class="nav-item active" href="referrals.html"><span class="nav-icon"><i class="fas fa-sitemap"></i></span> 회원 추천 트리</a>
        <div class="nav-section" style="margin-top:16px;">계정</div>
        <a class="nav-item" href="#" onclick="logout()"><span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span> 로그아웃</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar">K</div>
          <div class="user-info">
            <div class="user-name">김철수</div>
            <div class="user-rank">⭐ 팀장</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <span class="topbar-title">
          <i class="fas fa-sitemap" style="color:var(--accent-gold);margin-right:8px;"></i>
          회원 추천 트리
        </span>
        <div class="topbar-actions">
          <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
            <i class="fas fa-moon" id="theme-icon"></i>
            <span id="theme-label">라이트</span>
          </button>
        </div>
      </header>

      <div class="page-content">

        <!-- Summary Stats -->
        <div class="grid grid-4 mb-24" style="gap:16px;">
          <div class="stat-card anim-fadeInUp delay-1">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <div class="stat-value" id="sc-total">0</div>
            <div class="stat-label">전체 하부 회원</div>
          </div>
          <div class="stat-card blue anim-fadeInUp delay-2">
            <div class="stat-icon"><i class="fas fa-user-plus"></i></div>
            <div class="stat-value" id="sc-direct">0</div>
            <div class="stat-label">직계 추천 회원</div>
          </div>
          <div class="stat-card green anim-fadeInUp delay-3">
            <div class="stat-icon"><i class="fas fa-layer-group"></i></div>
            <div class="stat-value" id="sc-depth">0</div>
            <div class="stat-label">최대 계보 깊이</div>
          </div>
          <div class="stat-card anim-fadeInUp delay-4" style="--accent-gold:#8e44ad;">
            <div class="stat-icon" style="background:rgba(142,68,173,0.1);color:#9b59b6;"><i class="fas fa-coins"></i></div>
            <div class="stat-value" id="sc-invest" style="font-size:18px;">₩0</div>
            <div class="stat-label">하부 총 투자금</div>
          </div>
        </div>

        <!-- Canvas Tree -->
        <div class="card mb-24 anim-fadeInUp">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-project-diagram icon"></i> 추천 계보 트리</span>
            <div class="tree-toolbar">
              <button class="btn btn-outline btn-sm" onclick="zoomIn()"><i class="fas fa-search-plus"></i></button>
              <button class="btn btn-outline btn-sm" onclick="zoomOut()"><i class="fas fa-search-minus"></i></button>
              <button class="btn btn-outline btn-sm" onclick="resetView()"><i class="fas fa-expand-arrows-alt"></i> 초기화</button>
            </div>
          </div>
          <div class="card-body" style="padding:0;">
            <div class="tree-canvas-wrapper" style="height:480px;">
              <canvas id="treeCanvas"></canvas>
              <div class="node-tooltip" id="nodeTooltip"></div>
            </div>
            <div style="padding:16px 24px;">
              <div class="tree-legend">
                <div class="legend-item">
                  <div class="legend-dot" style="background:#d4a017;"></div> 나 (루트)
                </div>
                <div class="legend-item">
                  <div class="legend-dot" style="background:#5a7bff;"></div> 직계 하부 (1단계)
                </div>
                <div class="legend-item">
                  <div class="legend-dot" style="background:#27ae60;"></div> 2단계 이하
                </div>
                <div class="legend-item">
                  <div class="legend-dot" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);"></div> 하부 없음
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Member List -->
        <div class="card anim-fadeInUp delay-2">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-list icon"></i> 하부 회원 리스트</span>
            <div style="font-size:12px;color:var(--text-muted);" id="list-count-el">총 0명</div>
          </div>
          <div class="card-body" style="padding:0;">
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>회원아이디</th>
                    <th>이름</th>
                    <th>직급</th>
                    <th>투자금</th>
                    <th>투자 시작일</th>
                    <th>계보 깊이</th>
                    <th>하부 수</th>
                  </tr>
                </thead>
                <tbody id="referral-list-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script>
    // ── 인증 가드 ──
    (function(){
      var t=localStorage.getItem('dangun_token');
      var u=null;try{u=JSON.parse(localStorage.getItem('dangun_user')||'null');}catch(e){}
      if(!t||!u||!u.id){localStorage.removeItem('dangun_token');localStorage.removeItem('dangun_user');location.replace('/index.html');}
    })();

    // ── Tree Data (DB 연동) ──
    let rootMember = null;   // 로그인 회원 (본인)
    let flatMembers = [];    // 하부 회원 평탄화 목록

    // ── Canvas Variables ──
    const canvas = document.getElementById('treeCanvas');
    const ctx = canvas.getContext('2d');
    let scale = 1;
    let offsetX = 0, offsetY = 0;
    let isDragging = false, lastX = 0, lastY = 0;
    const nodeMap = [];

    const NODE_W = 148, NODE_H = 72, NODE_GAP_H = 110, NODE_GAP_V = 95;

    document.addEventListener('DOMContentLoaded', async () => {
      applyTheme(getTheme());
      initSidebarUser();
      await loadReferralData();
      initCanvas();
      canvas.addEventListener('mousemove', onMouseMove);
    });

    // ── 사이드바 사용자 정보 ──
    function initSidebarUser() {
      const user = Auth ? Auth.getUser() : {};
      const nameEl = document.querySelector('.sidebar-footer .user-name');
      const rankEl = document.querySelector('.sidebar-footer .user-rank');
      const avEl   = document.querySelector('.sidebar-footer .user-avatar');
      if (nameEl) nameEl.textContent = user.name || '-';
      if (rankEl) rankEl.textContent = user.rank || '';
      if (avEl)   avEl.textContent   = (user.name||'?')[0];
    }

    // ── DB 데이터 로드 ──
    async function loadReferralData() {
      try {
        const user = Auth.getUser();
        if (!user || !user.id) { location.replace('/index.html'); return; }

        // 추천 트리 API - /api/members/my/referrals (회원 전용, 관리자 전용 아님)
        const treeData = await MembersAPI.myReferrals();

        // 대시보드에서 본인 정보 로드
        let me = user;
        try {
          const dashData = await DashboardAPI.member();
          me = dashData.member || user;
        } catch(dashErr) {
          console.warn('[referrals] 대시보드 로드 실패, user 캐시 사용:', dashErr.message);
        }

        flatMembers = treeData.flat || [];

        // 본인 노드 구성 (루트)
        rootMember = {
          id:               me.id || user.id,
          user_id:          me.user_id || user.user_id || '',
          name:             me.name || user.name || '',
          rank:             me.rank || user.rank || '일반회원',
          investment_total: me.investment_total || 0,
          investment_date:  me.investment_date || null,
          children:         buildTree(flatMembers, me.id || user.id),
          isRoot:           true,
        };

        // API 응답에서 통계 데이터 사용 (백엔드에서 미리 계산)
        const refStats = {
          total:        treeData.total        || 0,
          direct_count: treeData.direct_count || 0,
          max_depth:    treeData.max_depth    || 0,
          total_invest: treeData.total_invest || 0,
        };

        renderStats(refStats);
        renderMemberList();
        initCanvas();
      } catch(e) {
        console.error('[referrals] 로드 오류:', e);
        let errMsg = e.message || '알 수 없는 오류';
        // 권한 오류 메시지 개선
        if (errMsg.includes('관리자') || errMsg.includes('403') || errMsg.includes('401')) {
          errMsg = 'API 연결 오류. 로그인 상태를 확인하세요.';
        }
        showToast('추천 트리 로드 실패: ' + errMsg, 'error');
        // 빈 상태로 표시
        const u = Auth.getUser() || {};
        rootMember = {
          id: u.id || 0, user_id: u.user_id || '', name: u.name || '',
          rank: u.rank || '일반회원', investment_total: 0, investment_date: null,
          children: [], isRoot: true
        };
        flatMembers = [];
        renderStats({ total: 0, direct_count: 0, max_depth: 0, total_invest: 0 });
        renderMemberList();
        initCanvas();
      }
    }

    // flat 배열 → 트리 구조 변환 (recommender_id 기준)
    function buildTree(flatArr, rootId) {
      const childrenOf = {};
      flatArr.forEach(m => {
        const pid = m.recommender_id;
        if (!childrenOf[pid]) childrenOf[pid] = [];
        childrenOf[pid].push(m);
      });
      function children(pid) {
        return (childrenOf[pid] || []).map(m => ({
          ...m,
          children: children(m.id),
        }));
      }
      return children(rootId);
    }

    // ── Statistics ──
    function countAll(arr) {
      return arr.reduce((a, m) => a + 1 + countAll(m.children || []), 0);
    }
    function maxDepth(arr) {
      if (!arr || !arr.length) return 0;
      return 1 + Math.max(0, ...arr.map(m => maxDepth(m.children || [])));
    }
    function sumInvest(arr) {
      return arr.reduce((a, m) => a + (m.investment_total || 0) + sumInvest(m.children || []), 0);
    }

    function renderStats(refStats) {
      const refs   = rootMember ? (rootMember.children || []) : [];
      // API가 미리 계산한 값 우선 사용, 없으면 클라이언트 계산
      const total  = (refStats.total        != null) ? refStats.total        : countAll(refs);
      const direct = (refStats.direct_count != null) ? refStats.direct_count : refs.length;
      const depth  = (refStats.max_depth    != null) ? refStats.max_depth    : maxDepth(refs);
      const invest = (refStats.total_invest != null) ? refStats.total_invest : sumInvest(refs);

      document.getElementById('sc-total').textContent  = total.toLocaleString('ko-KR');
      document.getElementById('sc-direct').textContent = direct.toLocaleString('ko-KR');
      document.getElementById('sc-depth').textContent  = depth + '단계';
      document.getElementById('sc-invest').textContent = '₩' + Math.round(invest).toLocaleString('ko-KR');
      document.getElementById('list-count-el').textContent = `총 ${total.toLocaleString('ko-KR')}명`;
    }

    // ── Member List (하부 전체, 본인 제외) ──
    function flatList(arr, depth) {
      let result = [];
      (arr || []).forEach(m => {
        result.push({...m, _depth: depth});
        result = result.concat(flatList(m.children || [], depth + 1));
      });
      return result;
    }

    function renderMemberList() {
      if (!rootMember) return;
      const list  = flatList(rootMember.children || [], 1);
      const tbody = document.getElementById('referral-list-tbody');
      if (list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted);">하부 회원이 없습니다.</td></tr>`;
        return;
      }
      tbody.innerHTML = list.map(m => `
        <tr>
          <td>
            <div class="member-card">
              <div class="member-avatar-sm">${(m.name||'?')[0]}</div>
              <div><div style="font-weight:700;font-size:13px;">${m.user_id}</div></div>
            </div>
          </td>
          <td>${m.name}</td>
          <td>${rankBadge(m.rank || '일반회원')}</td>
          <td style="font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--accent-gold);">
            ${m.investment_total ? '₩' + Math.round(m.investment_total).toLocaleString('ko-KR') : '-'}
          </td>
          <td style="font-size:12px;">${formatDate(m.investment_date)}</td>
          <td>
            <span style="padding:3px 10px;background:rgba(90,123,255,0.15);color:var(--accent-blue);border-radius:8px;font-size:11px;font-weight:700;">
              ${m._depth}단계
            </span>
          </td>
          <td style="text-align:center;font-weight:700;">${(m.children||[]).length}</td>
        </tr>
      `).join('');
    }

    // ── Canvas Tree Drawing ──
    function initCanvas() {
      resizeCanvas();
      window.addEventListener('resize', () => { resizeCanvas(); drawTree(); });
      canvas.addEventListener('mousedown', startDrag);
      canvas.addEventListener('mousemove', moveDrag);
      canvas.addEventListener('mouseup', endDrag);
      canvas.addEventListener('mouseleave', endDrag);
      canvas.addEventListener('wheel', onWheel, { passive: false });
      canvas.addEventListener('touchstart', touchStart, { passive: false });
      canvas.addEventListener('touchmove', touchMove, { passive: false });
      canvas.addEventListener('touchend', endDrag);
      resetView();
    }

    function resizeCanvas() {
      const wrapper = canvas.parentElement;
      canvas.width  = wrapper.offsetWidth;
      canvas.height = wrapper.offsetHeight;
    }

    function layoutTree(node, x, y, level) {
      const result = { node, x, y, level, children: [] };
      if (!node.children || node.children.length === 0) return result;

      const childCount = node.children.length;
      const totalWidth = childCount * NODE_W + (childCount - 1) * NODE_GAP_H;
      let startX = x - totalWidth / 2;

      node.children.forEach(child => {
        const childLayout = layoutTree(child, startX + NODE_W / 2, y + NODE_H + NODE_GAP_V, level + 1);
        result.children.push(childLayout);
        startX += NODE_W + NODE_GAP_H;
      });

      return result;
    }

    function drawNode(layout, isDark) {
      const { node, x, y, level } = layout;
      const hw = NODE_W / 2, hh = NODE_H / 2;

      nodeMap.push({ x, y, w: NODE_W, h: NODE_H, node });

      // Shadow
      ctx.shadowColor = level === 0 ? 'rgba(212,160,23,0.5)' : 'rgba(0,0,0,0.3)';
      ctx.shadowBlur = level === 0 ? 16 : 8;
      ctx.shadowOffsetY = 3;

      // Box
      const radius = 10;
      ctx.beginPath();
      ctx.roundRect(x - hw, y - hh, NODE_W, NODE_H, radius);

      if (level === 0) {
        const grad = ctx.createLinearGradient(x - hw, y - hh, x + hw, y + hh);
        grad.addColorStop(0, '#d4a017');
        grad.addColorStop(1, '#f0c040');
        ctx.fillStyle = grad;
      } else if (level === 1) {
        ctx.fillStyle = isDark ? '#1e2a5e' : '#dde4ff';
      } else {
        ctx.fillStyle = isDark ? '#1a2035' : '#f0f4ff';
      }
      ctx.fill();

      // Border
      ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
      ctx.strokeStyle = level === 0 ? '#f0c040' : level === 1 ? '#5a7bff' : (isDark ? '#2a3a6a' : '#c0caf5');
      ctx.lineWidth = level === 0 ? 2 : 1.5;
      ctx.stroke();

      // Name
      ctx.fillStyle = level === 0 ? '#1a1a2e' : (isDark ? '#e0e0ff' : '#1a1a2e');
      ctx.font = `bold 13px 'Noto Sans KR', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(node.name, x, y - 10);

      // ID
      ctx.fillStyle = level === 0 ? 'rgba(26,26,46,0.7)' : (isDark ? 'rgba(160,160,200,0.7)' : 'rgba(80,80,120,0.7)');
      ctx.font = `11px 'Noto Sans KR', sans-serif`;
      ctx.fillText('@' + node.user_id, x, y + 6);

      // Investment
      ctx.fillStyle = level === 0 ? 'rgba(26,26,46,0.9)' : (isDark ? '#d4a017' : '#b08010');
      ctx.font = `bold 11px 'Orbitron', sans-serif`;
      ctx.fillText(formatMoneyK(node.investment_total), x, y + 22);
    }

    function drawConnector(parent, child, isDark) {
      const fromX = parent.x, fromY = parent.y + NODE_H / 2;
      const toX   = child.x,  toY   = child.y - NODE_H / 2;

      const midY = (fromY + toY) / 2;
      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.bezierCurveTo(fromX, midY, toX, midY, toX, toY);
      ctx.strokeStyle = isDark ? 'rgba(212,160,23,0.3)' : 'rgba(212,160,23,0.5)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawLayout(layout, isDark) {
      layout.children.forEach(child => {
        drawConnector(layout, child, isDark);
        drawLayout(child, isDark);
      });
      drawNode(layout, isDark);
    }

    function drawTree() {
      if (!rootMember) return;
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      nodeMap.length = 0;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(offsetX, offsetY);
      ctx.scale(scale, scale);

      const layout = layoutTree(rootMember, canvas.width / 2 / scale, 60, 0);
      drawLayout(layout, isDark);

      ctx.restore();
    }

    function resetView() {
      scale = 1;
      offsetX = 0;
      offsetY = 40;
      drawTree();
    }

    function zoomIn()  { scale = Math.min(scale * 1.2, 3);  drawTree(); }
    function zoomOut() { scale = Math.max(scale / 1.2, 0.3); drawTree(); }

    function onWheel(e) {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      scale = Math.min(Math.max(scale * delta, 0.3), 3);
      drawTree();
    }

    function startDrag(e) {
      isDragging = true;
      lastX = e.clientX; lastY = e.clientY;
    }
    function moveDrag(e) {
      if (!isDragging) return;
      offsetX += e.clientX - lastX;
      offsetY += e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      drawTree();
    }
    function endDrag() { isDragging = false; }

    let touchDist = 0;
    function touchStart(e) {
      if (e.touches.length === 2) {
        touchDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      } else if (e.touches.length === 1) {
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        isDragging = true;
      }
    }
    function touchMove(e) {
      e.preventDefault();
      if (e.touches.length === 2) {
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        scale = Math.min(Math.max(scale * (dist / touchDist), 0.3), 3);
        touchDist = dist;
        drawTree();
      } else if (isDragging && e.touches.length === 1) {
        offsetX += e.touches[0].clientX - lastX;
        offsetY += e.touches[0].clientY - lastY;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        drawTree();
      }
    }

    // Hover tooltip
    function onMouseMove(e) {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left - offsetX) / scale;
      const my = (e.clientY - rect.top  - offsetY) / scale;
      const tooltip = document.getElementById('nodeTooltip');

      const hit = nodeMap.find(n =>
        mx >= n.x - n.w/2 && mx <= n.x + n.w/2 &&
        my >= n.y - n.h/2 && my <= n.y + n.h/2
      );

      if (hit) {
        tooltip.classList.add('show');
        tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
        tooltip.style.top  = (e.clientY - rect.top  - 40) + 'px';
        const m = hit.node;
        tooltip.innerHTML = `
          <div style="font-weight:700;color:var(--accent-gold);margin-bottom:6px;">${m.name} (@${m.user_id})</div>
          <div style="font-size:11px;color:var(--text-muted);">직급: ${m.rank}</div>
          <div style="font-size:11px;color:var(--text-muted);">투자금: ₩${Math.round(m.investment_total || 0).toLocaleString('ko-KR')}</div>
          <div style="font-size:11px;color:var(--text-muted);">하부회원: ${m.children ? m.children.length : 0}명</div>
        `;
        canvas.style.cursor = 'pointer';
      } else {
        tooltip.classList.remove('show');
        canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
      }
    }

    // Re-draw on theme change
    const originalToggle = window.toggleTheme || function(){};
    window.toggleTheme = function() {
      originalToggle();
      setTimeout(drawTree, 50);
    };
  </script>
</body>
</html>

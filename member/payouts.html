<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DANGUN - 투자금 지급내역</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/theme.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ── Summary Top Banner ── */
    .payout-banner {
      background: var(--gradient-dark);
      border: 1px solid rgba(212,160,23,0.3);
      border-radius: var(--radius-xl);
      padding: 28px 36px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      animation: borderGlow 4s ease-in-out infinite;
    }

    .payout-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 50%, rgba(212,160,23,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .banner-stat {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .banner-stat + .banner-stat::before {
      content: '';
      position: absolute;
      left: -10px; top: 20%;
      height: 60%;
      width: 1px;
      background: rgba(212,160,23,0.2);
    }

    .banner-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--accent-gold-light);
      line-height: 1;
      margin-bottom: 6px;
    }

    .banner-lbl {
      font-size: 11px;
      color: rgba(200,204,232,0.5);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── Timeline Payout List ── */
    .timeline {
      position: relative;
      padding-left: 40px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 15px; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, var(--accent-gold) 0%, var(--border-color) 100%);
    }

    .tl-item {
      position: relative;
      margin-bottom: 16px;
      animation: fadeInUp 0.4s ease forwards;
      opacity: 0;
    }

    .tl-dot {
      position: absolute;
      left: -32px; top: 16px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--border-color);
      border: 2px solid var(--border-color);
      transition: var(--transition);
    }

    .tl-item.paid .tl-dot {
      background: var(--accent-green);
      border-color: var(--accent-green);
      box-shadow: 0 0 8px rgba(39,174,96,0.5);
    }

    .tl-item.current .tl-dot {
      background: var(--accent-gold);
      border-color: var(--accent-gold);
      box-shadow: 0 0 12px rgba(212,160,23,0.6);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .tl-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: var(--transition);
    }

    .tl-item.paid .tl-card {
      border-color: rgba(39,174,96,0.2);
    }

    .tl-item.current .tl-card {
      border-color: rgba(212,160,23,0.4);
      background: rgba(212,160,23,0.04);
      box-shadow: 0 0 16px rgba(212,160,23,0.1);
    }

    .tl-card:hover { transform: translateX(4px); box-shadow: var(--shadow-md); }

    .tl-week {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--accent-gold);
      min-width: 60px;
      text-align: center;
    }

    .tl-content { flex: 1; }

    .tl-date {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .tl-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .tl-amounts {
      text-align: right;
      min-width: 160px;
    }

    .tl-total {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: var(--text-primary);
    }

    .tl-balance {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* Chart Container */
    .chart-wrap {
      position: relative;
      height: 260px;
    }

    @media (max-width: 1000px) {
      .payout-banner { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 640px) {
      .payout-banner { grid-template-columns: repeat(2, 1fr); padding: 20px; }
      .tl-amounts { display: none; }
    }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="app-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <a class="sidebar-logo" href="index.html">
          <div class="logo-icon">D</div>
          <div class="logo-text">
            <span class="logo-name">DANGUN</span>
            <span class="logo-sub">Financial Platform</span>
          </div>
        </a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">회원 메뉴</div>
        <a class="nav-item" href="index.html"><span class="nav-icon"><i class="fas fa-home"></i></span> 대시보드</a>
        <a class="nav-item active" href="payouts.html"><span class="nav-icon"><i class="fas fa-coins"></i></span> 투자금 지급내역</a>
        <a class="nav-item" href="referrals.html"><span class="nav-icon"><i class="fas fa-sitemap"></i></span> 회원 추천 트리</a>
        <div class="nav-section" style="margin-top:16px;">계정</div>
        <a class="nav-item" href="#" onclick="logout()"><span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span> 로그아웃</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar">K</div>
          <div class="user-info">
            <div class="user-name">김철수</div>
            <div class="user-rank">⭐ 팀장</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <span class="topbar-title">
          <i class="fas fa-coins" style="color:var(--accent-gold);margin-right:8px;"></i>
          투자금 지급내역
        </span>
        <div class="topbar-actions">
          <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
            <i class="fas fa-moon" id="theme-icon"></i>
            <span id="theme-label">라이트</span>
          </button>
        </div>
      </header>

      <div class="page-content">

        <!-- Summary Banner -->
        <div class="payout-banner anim-fadeInDown">
          <div class="banner-stat">
            <div class="banner-val" id="ban-invest">-</div>
            <div class="banner-lbl">원금 (투자금)</div>
          </div>
          <div class="banner-stat">
            <div class="banner-val" style="color:var(--accent-gold);" id="ban-total-payout">-</div>
            <div class="banner-lbl">총 지급액 (원금+이자150%)</div>
          </div>
          <div class="banner-stat">
            <div class="banner-val" style="color:#7ec8e3;" id="ban-weekly">-</div>
            <div class="banner-lbl">주당 지급액 (÷15)</div>
          </div>
          <div class="banner-stat">
            <div class="banner-val" style="color:var(--accent-green);" id="ban-paid">-</div>
            <div class="banner-lbl">누적 지급액</div>
          </div>
          <div class="banner-stat">
            <div class="banner-val" style="color:rgba(200,204,232,0.7);" id="ban-remain">-</div>
            <div class="banner-lbl">잔여 지급액</div>
          </div>
        </div>

        <!-- Chart + Table -->
        <div class="grid grid-2 mb-24" style="gap:20px;">
          <!-- 진행률 차트 -->
          <div class="card anim-fadeInUp delay-1">
            <div class="card-header">
              <span class="card-title"><i class="fas fa-chart-line icon"></i> 15주 지급 진행 현황</span>
              <span class="badge badge-gold" id="chart-week-badge">8/15주</span>
            </div>
            <div class="card-body">
              <div class="chart-wrap">
                <canvas id="payoutChart"></canvas>
              </div>
            </div>
          </div>

          <!-- 주차별 상세 요약 -->
          <div class="card anim-fadeInUp delay-2">
            <div class="card-header">
              <span class="card-title"><i class="fas fa-table icon"></i> 주차별 지급 요약</span>
            </div>
            <div class="card-body" style="padding:0;">
              <div class="table-wrapper" style="max-height:280px;overflow-y:auto;">
                <table>
                  <thead>
                    <tr>
                      <th>주차</th>
                      <th>지급일</th>
                      <th>지급액</th>
                      <th>잔고</th>
                      <th>상태</th>
                    </tr>
                  </thead>
                  <tbody id="payout-summary-tbody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <!-- Timeline Detail -->
        <div class="card anim-fadeInUp delay-3">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-stream icon"></i> 지급 타임라인 (원금+이자 상세)</span>
            <div style="font-size:12px;color:var(--text-muted);">
              투자 승인일 기준 매 +7일 · 15주 완납
            </div>
          </div>
          <div class="card-body">
            <div class="timeline" id="payout-timeline"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/dgn.js"></script>
  <script>
    // 인증 체크
    (function(){
      var t=localStorage.getItem('dangun_token');
      var u=null;try{u=JSON.parse(localStorage.getItem('dangun_user')||'null');}catch(e){}
      if(!t||!u||!u.id){localStorage.removeItem('dangun_token');localStorage.removeItem('dangun_user');localStorage.removeItem('dangun_admin');location.replace('/index.html');}
    })();

    let _memberData = null;
    let _payoutsData = [];
    let _chartInstance = null;
    let _investData   = null;  // 투자 원본 데이터 보관

    document.addEventListener('DOMContentLoaded', async () => {
      applyTheme(getTheme());
      if (window.DGN) DGN.init().catch(()=>{});
      await loadPayouts();
    });

    /**
     * 투자 승인일(approved_date) 기준으로 N주차 지급예정일 계산
     * @param {object} inv  투자 레코드
     * @param {number} week 1~15
     * @returns {string} YYYY-MM-DD
     */
    function calcPayDate(inv, week) {
      const base = inv.approved_date || inv.investment_date || inv.created_at;
      if (!base) return '';
      const d = new Date(base);
      d.setDate(d.getDate() + 7 * week);
      return d.toISOString().slice(0, 10);
    }

    async function loadPayouts() {
      try {
        // 내 투자 정보
        const invData = await InvestmentsAPI.my();
        const investments = (invData && invData.investments) ? invData.investments : (Array.isArray(invData) ? invData : []);
        const inv = investments[0] || null;
        _investData = inv;

        // 내 지급 스케줄
        const memberInfo = Auth.getUser();
        _memberData = memberInfo;

        if (inv) {
          _payoutsData = await InvestmentsAPI.payouts(inv.id).catch(()=>[]);
          if (!Array.isArray(_payoutsData)) _payoutsData = _payoutsData.payouts || [];

          // +7일 간격 기준으로 scheduled_date 재계산
          _payoutsData = _payoutsData.map(function(p) {
            return Object.assign({}, p, { scheduled_date: calcPayDate(inv, p.week_number) });
          });

          // DB에 데이터 없는 경우 15주 허수 스케줄 생성
          if (_payoutsData.length === 0) {
            const totalPayout = Math.round((inv.amount || 0) * 1.5);
            const weeklyAmt   = totalPayout > 0 ? Math.floor(totalPayout / 15) : 0;
            const currentWeek = inv.current_week || 0;
            _payoutsData = Array.from({ length: 15 }, (_, i) => {
              const w = i + 1;
              return {
                week_number:       w,
                scheduled_date:    calcPayDate(inv, w),
                total_payout:      weeklyAmt,
                principal_portion: Math.floor((inv.amount || 0) / 15),
                profit_portion:    weeklyAmt - Math.floor((inv.amount || 0) / 15),
                balance_after:     totalPayout - weeklyAmt * w,
                status:            w <= currentWeek ? 'paid' : 'pending',
                paid_date:         w <= currentWeek ? calcPayDate(inv, w) : null,
                is_partial:        false
              };
            });
          }
        }

        // 사이드바 회원정보 업데이트
        const nameEl = document.querySelector('.sidebar .user-name');
        const rankEl = document.querySelector('.sidebar .user-rank');
        if (nameEl) nameEl.textContent = memberInfo.name || '-';
        if (rankEl) rankEl.textContent = memberInfo.rank || '-';

        renderBanner(inv);
        renderChart(inv);
        renderSummaryTable();
        renderTimeline(inv);

        // DGN 환산 적용
        if (window.DGN) DGN.applyAll();
      } catch(err) {
        showToast('지급 내역 로드 실패: ' + err.message, 'error');
        console.error(err);
      }
    }

    function renderBanner(inv) {
      const noData = (id) => { const el = document.getElementById(id); if (el) el.textContent = '-'; };
      if (!inv) {
        ['ban-invest','ban-total-payout','ban-weekly','ban-paid','ban-remain'].forEach(noData);
        return;
      }
      // 원금
      const principal   = inv.amount || 0;
      // 총지급액 = 원금 * 1.5 (50% 이자)
      const totalPayout = Math.round(principal * 1.5);
      // 주당지급액 = 총지급액 ÷ 15 (정수)
      const weeklyAmt   = totalPayout > 0 ? Math.round(totalPayout / 15) : 0;

      const setVal = (id, v) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.innerHTML = formatMoney(v) + (window.DGN ? DGN.html(v) : '');
      };
      setVal('ban-invest',       principal);
      setVal('ban-total-payout', totalPayout);
      setVal('ban-weekly',       weeklyAmt);
      setVal('ban-paid',         inv.paid_amount || 0);
      setVal('ban-remain',       inv.remaining_amount || 0);
    }

    function renderChart(inv) {
      const payouts = _payoutsData;
      if (!payouts || payouts.length === 0) return;
      const ctx = document.getElementById('payoutChart').getContext('2d');
      const labels = payouts.map(p => p.week_number + '주');
      const paidData = payouts.map(p => p.status === 'paid' ? (p.total_payout || 0) : 0);
      const pendingData = payouts.map(p => p.status === 'pending' ? (p.total_payout || 0) : 0);
      const balanceData = payouts.map(p => p.balance_after || 0);

      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
      const textColor = isDark ? 'rgba(200,200,230,0.7)' : 'rgba(50,50,80,0.7)';

      if (_chartInstance) _chartInstance.destroy();
      _chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: '지급 완료', data: paidData, backgroundColor: 'rgba(39,174,96,0.7)', borderColor: 'rgba(39,174,96,1)', borderWidth: 1, borderRadius: 4 },
            { label: '지급 예정', data: pendingData, backgroundColor: 'rgba(212,160,23,0.3)', borderColor: 'rgba(212,160,23,0.6)', borderWidth: 1, borderRadius: 4 },
            { label: '잔고', data: balanceData, type: 'line', borderColor: 'rgba(90,123,255,0.8)', backgroundColor: 'rgba(90,123,255,0.05)', borderWidth: 2, pointRadius: 3, fill: false, yAxisID: 'y2', tension: 0.4 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top', labels: { color: textColor, font: { size: 11 }, boxWidth: 12 } },
            tooltip: { callbacks: { label: function(c) { return ' ' + c.dataset.label + ': ' + Number(c.raw).toLocaleString() + '원'; } } }
          },
          scales: {
            x: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 } } },
            y: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 }, callback: function(v){ return (v/1000).toFixed(0)+'K'; } }, stacked: false },
            y2: { position: 'right', grid: { display: false }, ticks: { color: textColor, font: { size: 10 }, callback: function(v){ return (v/10000).toFixed(0)+'만'; } } }
          }
        }
      });

      const currentWeek = inv ? (inv.current_week || 0) : 0;
      const totalWeeks  = inv ? (inv.total_weeks || 15) : 15;
      document.getElementById('chart-week-badge').textContent = currentWeek + '/' + totalWeeks + '주';
    }

    function renderSummaryTable() {
      const payouts = _payoutsData;
      const tbody = document.getElementById('payout-summary-tbody');
      if (!payouts || payouts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-muted);">투자 내역이 없습니다</td></tr>';
        return;
      }
      tbody.innerHTML = payouts.map(function(p) {
        var sd = p.scheduled_date || (_investData ? calcPayDate(_investData, p.week_number) : '');
        return `
        <tr>
          <td style="font-family:'Orbitron',sans-serif;font-weight:700;color:var(--accent-gold);">${p.week_number}주</td>
          <td style="font-size:12px;">${formatDate(sd)}</td>
          <td style="font-weight:700;">${formatMoney(p.total_payout)}${window.DGN ? DGN.html(p.total_payout) : ''}</td>
          <td style="font-size:12px;color:var(--text-muted);">${formatMoney(p.balance_after)}</td>
          <td>${statusBadge(p.status)}</td>
        </tr>
      `; }).join('');
    }

    function renderTimeline(inv) {
      const payouts = _payoutsData;
      const container = document.getElementById('payout-timeline');
      const currentWeek = inv ? (inv.current_week || 0) : 0;

      if (!payouts || payouts.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);">투자 지급 내역이 없습니다</div>';
        return;
      }

      container.innerHTML = payouts.map(function(p, i) {
        var cls = 'pending';
        if (p.status === 'paid') cls = 'paid';
        else if (p.week_number === currentWeek + 1) cls = 'current';

        // 지급일: 투자 승인일 기준 +7일 * week
        var sd = p.scheduled_date || (_investData ? calcPayDate(_investData, p.week_number) : '');
        var dgnHtml = window.DGN ? DGN.html(p.total_payout) : '';

        return `<div class="tl-item ${cls}" style="animation-delay:${i * 0.05}s;">
            <div class="tl-dot"></div>
            <div class="tl-card">
              <div class="tl-week">${p.week_number}W</div>
              <div class="tl-content">
                <div class="tl-date">${formatDate(sd)}
                  ${p.status === 'paid' && p.paid_date ? '<span style="font-size:10px;color:var(--accent-green);margin-left:8px;">✓ 지급완료 ' + formatDate(p.paid_date) + '</span>' : ''}
                  ${cls === 'current' ? '<span style="font-size:10px;color:var(--accent-gold);margin-left:8px;">● 다음 지급</span>' : ''}
                </div>
                <div class="tl-sub">원금 ${formatMoney(p.principal_portion)} + 수익 <span style="color:var(--accent-green);">${formatMoney(p.profit_portion)}</span>
                  ${p.is_partial ? '<span class="badge badge-orange" style="font-size:10px;padding:2px 6px;">부분지급</span>' : ''}
                </div>
              </div>
              <div class="tl-amounts">
                <div class="tl-total">${formatMoney(p.total_payout)}${dgnHtml}</div>
                <div class="tl-balance">잔고 → ${formatMoney(p.balance_after)}</div>
              </div>
              <div style="margin-left:8px;">${statusBadge(p.status)}</div>
            </div>
          </div>`;
      }).join('');
    }
  </script>
</body>
</html>

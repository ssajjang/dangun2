<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DANGUN - 투자금 출금 관리</title>
  <!-- location.replace 오류 방지를 위한 try-catch 가드 적용 -->
  <script>(function(){var t=localStorage.getItem('dangun_token');var a=null;try{a=JSON.parse(localStorage.getItem('dangun_admin')||'null');}catch(e){}if(!t||!a||!a.id){localStorage.removeItem('dangun_token');localStorage.removeItem('dangun_admin');localStorage.removeItem('dangun_user');try{location.replace('/index.html');}catch(e){}}})();</script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/theme.css">
  <!-- 엑셀 다운로드를 위한 SheetJS 라이브러리 추가 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    .filter-bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
    .filter-bar .form-control { width:auto; min-width:120px; }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="app-wrapper">
    <aside class="sidebar" style="background:linear-gradient(180deg,#0d0d1a 0%,#12122a 60%,#0f1535 100%);">
      <div class="sidebar-header">
        <a class="sidebar-logo" href="dashboard.html">
          <div class="logo-icon">D</div>
          <div class="logo-text"><span class="logo-name">DANGUN</span><span class="logo-sub">Admin Panel</span></div>
        </a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">메인</div>
        <a class="nav-item" href="dashboard.html"><span class="nav-icon"><i class="fas fa-chart-pie"></i></span> 대시보드</a>
        <div class="nav-section">회원 관리</div>
        <a class="nav-item" href="members.html"><span class="nav-icon"><i class="fas fa-users"></i></span> 회원 정보</a>
        <div class="nav-section">투자 관리</div>
        <a class="nav-item" href="deposit.html"><span class="nav-icon"><i class="fas fa-arrow-circle-down"></i></span> 투자금 입금</a>
        <a class="nav-item active" href="withdrawal.html"><span class="nav-icon"><i class="fas fa-arrow-circle-up"></i></span> 투자금 출금</a>
        <a class="nav-item" href="commission.html"><span class="nav-icon"><i class="fas fa-hand-holding-usd"></i></span> 직급 수당</a>
        <a class="nav-item" href="simulate.html"><span class="nav-icon"><i class="fas fa-play-circle"></i></span> 지급 시뮬레이션</a>
        <a class="nav-item" href="reset.html"><span class="nav-icon"><i class="fas fa-trash-alt"></i></span> 초기화/회원추가</a>
        <div class="nav-section" style="margin-top:16px;">설정</div>
        <a class="nav-item" href="#" onclick="doLogout()"><span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span> 로그아웃</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar" style="background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;">A</div>
          <div class="user-info"><div class="user-name">최고관리자</div><div class="user-rank" style="color:var(--accent-red);">🛡 SuperAdmin</div></div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <span class="topbar-title"><i class="fas fa-arrow-circle-up" style="color:var(--accent-gold);margin-right:8px;"></i> 투자금 출금 관리</span>
        <div class="topbar-actions">
          <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
            <i class="fas fa-moon" id="theme-icon"></i><span id="theme-label">라이트</span>
          </button>
        </div>
      </header>

      <div class="page-content">
        <!-- KPIs (DB 연동) -->
        <div class="grid grid-4 mb-24" style="gap:14px;">
          <div class="stat-card anim-fadeInUp delay-1">
            <div class="stat-icon"><i class="fas fa-list"></i></div>
            <div class="stat-value" id="kpi-total-w">-</div><div class="stat-label">전체 출금 건수</div>
          </div>
          <div class="stat-card red anim-fadeInUp delay-2">
            <div class="stat-icon"><i class="fas fa-clock"></i></div>
            <div class="stat-value" id="kpi-pending-w">-</div><div class="stat-label">대기 건수</div>
          </div>
          <div class="stat-card green anim-fadeInUp delay-3">
            <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
            <div class="stat-value" id="kpi-done-w">-</div><div class="stat-label">처리 완료</div>
          </div>
          <div class="stat-card blue anim-fadeInUp delay-4">
            <div class="stat-icon"><i class="fas fa-coins"></i></div>
            <div class="stat-value" id="kpi-amount-w" style="font-size:18px;">-</div><div class="stat-label">대기 합계</div>
          </div>
        </div>

        <!-- Bulk Actions + Table -->
        <div class="card anim-fadeInUp">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-table icon"></i> 출금 내역</span>
            <div style="display:flex;gap:8px;align-items:center;">
              <button class="btn btn-sm" style="background:var(--accent-green);color:#fff;border:none;" onclick="openExportModal()">
                <i class="fas fa-file-excel"></i> 엑셀 다운로드
              </button>
              <button class="btn btn-success btn-sm" onclick="bulkApprove()">
                <i class="fas fa-check-double"></i> 선택 일괄 승인
              </button>
              <button class="btn btn-danger btn-sm" onclick="bulkReject()">
                <i class="fas fa-times-circle"></i> 선택 일괄 거절
              </button>
            </div>
          </div>
          <div class="card-body" style="padding:16px 20px 0;">
            <div class="filter-bar">
              <div class="input-icon-wrap" style="min-width:200px;">
                <i class="fas fa-search" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);"></i>
                <input type="text" class="form-control" id="search-w" placeholder="아이디, 이름 검색" oninput="filterWithdrawals()" style="padding-left:40px;">
              </div>
              <select class="form-control" id="filter-status-w" onchange="filterWithdrawals()">
                <option value="">전체 상태</option>
                <option value="pending">대기</option>
                <option value="paid">지급완료</option>
                <option value="rejected">거절</option>
              </select>
              <input type="date" class="form-control" id="filter-date-w" onchange="filterWithdrawals()">
              <button class="btn btn-outline btn-sm" onclick="clearFiltersW()"><i class="fas fa-redo"></i></button>
            </div>
          </div>
          <div class="card-body" style="padding:0 0 16px;">
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th><input type="checkbox" id="check-all-w" onchange="toggleAllW(this)" style="accent-color:var(--accent-gold);"></th>
                    <th>아이디</th>
                    <th>이름</th>
                    <th>은행 / 계좌</th>
                    <th>투자금</th>
                    <th>주차</th>
                    <th>지급 이자</th>
                    <th>출금 금액</th>
                    <th>신청일</th>
                    <th>출금일</th>
                    <th>상태</th>
                    <th>처리</th>
                  </tr>
                </thead>
                <tbody id="withdrawal-tbody"></tbody>
              </table>
            </div>
            <div class="pagination" id="withdrawal-pagination"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Reject Modal -->
  <div class="modal-overlay" id="modal-reject">
    <div class="modal" style="max-width:420px;">
      <div class="modal-header">
        <span class="modal-title">출금 거절</span>
        <button class="modal-close" onclick="closeModal('modal-reject')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">거절 사유 <span style="color:var(--accent-red)">*</span></label>
          <textarea class="form-control" id="reject-reason" rows="3" placeholder="거절 사유를 입력하세요..." style="resize:vertical;"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('modal-reject')">취소</button>
        <button class="btn btn-danger" onclick="executeReject()"><i class="fas fa-ban"></i> 거절 처리</button>
      </div>
    </div>
  </div>

  <!-- 엑셀 다운로드 Modal -->
  <div class="modal-overlay" id="modal-export">
    <div class="modal" style="max-width:420px;">
      <div class="modal-header">
        <span class="modal-title">엑셀 다운로드 설정</span>
        <button class="modal-close" onclick="closeModal('modal-export')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group mb-12">
          <label class="form-label">출금 상태</label>
          <select class="form-control" id="export-status">
            <option value="">전체 상태 내역</option>
            <option value="pending">출금 대기 내역</option>
            <option value="paid">출금 완료 내역</option>
            <option value="rejected">거절된 내역</option>
          </select>
        </div>
        <div class="form-group mb-12">
          <label class="form-label">시작일 (선택)</label>
          <input type="date" class="form-control" id="export-start">
        </div>
        <div class="form-group mb-12">
          <label class="form-label">종료일 (선택)</label>
          <input type="date" class="form-control" id="export-end">
        </div>
        <p style="font-size:12px;color:var(--text-muted); margin-top:10px;">
          * 날짜를 지정하지 않으면 해당 상태의 전체 데이터가 다운로드됩니다.
        </p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('modal-export')">취소</button>
        <button class="btn btn-success" onclick="executeExport()"><i class="fas fa-file-excel"></i> 엑셀 생성 및 다운로드</button>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script>
    let currentPageW  = 1;
    let totalCountW   = 0;
    const PAGE_LIMIT_W = 10;
    let rejectTargetId = null;

    document.addEventListener('DOMContentLoaded', () => {
      applyTheme(getTheme());
      loadWithdrawals();
    });

    async function loadWithdrawals() {
      const q      = document.getElementById('search-w').value.trim();
      const status = document.getElementById('filter-status-w').value;
      const fDate  = document.getElementById('filter-date-w').value;
      
      const params = { page: currentPageW, limit: PAGE_LIMIT_W };
      if (q)      params.search = q;
      if (status) params.status = status;
      if (fDate)  { params.start_date = fDate; params.end_date = fDate; }

      try {
        const data = await WithdrawalsAPI.list(params);
        totalCountW = data.total || 0;
        renderWithdrawalTable(data.data || []);

        // KPI 업데이트 로직 (동기화 방어 코드 강화)
        const s = data.stats || {};
        const setEl = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };
        
        const tot = s.total_count || s.totalCount || data.total || 0;
        const pen = s.pending_count || s.pendingCount || 0;
        const pd = s.paid_count || s.paidCount || s.completed_count || s.completedCount || 0;
        const amt = s.pending_amount || s.pendingAmount || 0;

        setEl('kpi-total-w',   tot);
        setEl('kpi-pending-w', pen);
        setEl('kpi-done-w',    pd);
        setEl('kpi-amount-w',  formatMoney(amt));
      } catch(err) {
        showToast('출금 목록 로드 실패: ' + err.message, 'error');
      }
    }

    function filterWithdrawals() {
      currentPageW = 1;
      loadWithdrawals();
    }

    function clearFiltersW() {
      document.getElementById('search-w').value = '';
      document.getElementById('filter-status-w').value = '';
      document.getElementById('filter-date-w').value = '';
      currentPageW = 1;
      loadWithdrawals();
    }

    // 목록 렌더링 시 외부 함수 의존성을 줄이고 대시보드 상태 동기화를 위해 상태 뱃지 및 액션 처리 자체 구현
    function renderWithdrawalTable(rows) {
      if (!rows.length) {
        document.getElementById('withdrawal-tbody').innerHTML =
          `<tr><td colspan="12" style="text-align:center;padding:24px;color:var(--text-muted);">출금 내역이 없습니다.</td></tr>`;
      } else {
        document.getElementById('withdrawal-tbody').innerHTML = rows.map(w => {
          // 백엔드 상태값 보정 (paid, completed 모두 지급완료로 처리)
          const wStatus = (w.status || '').toLowerCase();
          const isPending = wStatus === 'pending';
          const isPaid = (wStatus === 'paid' || wStatus === 'completed' || wStatus === 'done');
          const isRejected = wStatus === 'rejected';

          return `
            <tr id="wrow-${w.id}">
              <td><input type="checkbox" class="wrow-check" data-id="${w.id}" style="accent-color:var(--accent-gold);" ${!isPending ? 'disabled' : ''}></td>
              <td style="font-weight:700;">${w.user_id}</td>
              <td>${w.name}</td>
              <td style="font-size:12px;">${w.bank_name}<br><span style="color:var(--text-muted);">${w.account_number}</span></td>
              <td style="font-family:'Orbitron',sans-serif;font-size:12px;">${formatMoney(w.investment_amount||0)}</td>
              <td><span class="badge badge-blue">${w.week_number||'-'}주차</span></td>
              <td style="color:var(--accent-green);">-</td>
              <td style="font-weight:700;color:var(--accent-gold);">${formatMoney(w.amount)}</td>
              <td style="font-size:12px;">${w.request_date || w.created_at ? formatDate(w.request_date || w.created_at) : '-'}</td>
              <td style="font-size:12px;">${w.withdraw_date ? formatDate(w.withdraw_date) : '<span style="color:var(--text-muted);">-</span>'}</td>
              <td id="wstatus-${w.id}">
                ${isPaid ? `<span style="padding:3px 8px;background:rgba(39,174,96,0.15);color:var(--accent-green);border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;">✓ 지급완료</span>` : 
                  isPending ? `<span style="padding:3px 8px;background:rgba(231,76,60,0.15);color:#e74c3c;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;">⏳ 대기</span>` :
                  `<span style="padding:3px 8px;background:rgba(255,255,255,0.1);color:var(--text-muted);border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;">${isRejected ? '거절' : wStatus}</span>`}
              </td>
              <td id="waction-${w.id}">
                ${isPending ? `
                  <div style="display:flex;gap:4px;">
                    <button class="btn btn-success btn-sm" style="padding:4px 10px;font-size:11px;" onclick="approveOne(${w.id})">
                      <i class="fas fa-check"></i> 승인
                    </button>
                    <button class="btn btn-danger btn-sm" style="padding:4px 8px;font-size:11px;" onclick="openReject(${w.id})">
                      <i class="fas fa-times"></i>
                    </button>
                  </div>` : `<span style="font-size:11px;color:var(--text-muted);white-space:nowrap;">처리완료</span>`}
              </td>
            </tr>
          `;
        }).join('');
      }

      renderPagination('withdrawal-pagination', totalCountW, currentPageW, PAGE_LIMIT_W,
        `function(p){ currentPageW=p; loadWithdrawals(); }`);
    }

    async function approveOne(id) {
      if (!confirm('이 출금 요청을 승인하시겠습니까?')) return;
      try {
        await WithdrawalsAPI.approve(id);
        showToast('출금 승인 처리 완료', 'success');
        await loadWithdrawals();
      } catch(err) { showToast(err.message, 'error'); }
    }

    function openReject(id) {
      rejectTargetId = id;
      document.getElementById('reject-reason').value = '';
      openModal('modal-reject');
    }

    async function executeReject() {
      const reason = document.getElementById('reject-reason').value.trim();
      if (!reason) { showToast('거절 사유를 입력하세요.', 'warning'); return; }
      try {
        await WithdrawalsAPI.reject(rejectTargetId, reason);
        showToast('출금 거절 처리 완료', 'warning');
        closeModal('modal-reject');
        await loadWithdrawals();
      } catch(err) { showToast(err.message, 'error'); }
    }

    async function bulkApprove() {
      const checked = document.querySelectorAll('.wrow-check:checked:not(:disabled)');
      if (checked.length === 0) { showToast('선택된 대기 항목이 없습니다.', 'warning'); return; }
      if (!confirm(`${checked.length}건의 출금을 일괄 승인하시겠습니까?`)) return;
      const ids = [...checked].map(cb => parseInt(cb.dataset.id));
      try {
        await WithdrawalsAPI.bulkApprove(ids);
        showToast(`${ids.length}건 일괄 승인 처리되었습니다.`, 'success');
        document.getElementById('check-all-w').checked = false;
        await loadWithdrawals();
      } catch(err) { showToast(err.message, 'error'); }
    }

    async function bulkReject() {
      const checked = document.querySelectorAll('.wrow-check:checked:not(:disabled)');
      if (checked.length === 0) { showToast('선택된 대기 항목이 없습니다.', 'warning'); return; }
      const reason = prompt('일괄 거절 사유를 입력하세요:');
      if (!reason) return;
      const ids = [...checked].map(cb => parseInt(cb.dataset.id));
      let cnt = 0;
      for (const id of ids) {
        try { await WithdrawalsAPI.reject(id, reason); cnt++; } catch {}
      }
      showToast(`${cnt}건 거절 처리 완료`, 'warning');
      await loadWithdrawals();
    }

    function toggleAllW(el) {
      document.querySelectorAll('.wrow-check:not(:disabled)').forEach(cb => cb.checked = el.checked);
    }

    // ──────────────────────────────────────────────
    // 엑셀 다운로드 관련 함수 (이름, 은행, 계좌 분리)
    // ──────────────────────────────────────────────
    function openExportModal() {
      document.getElementById('export-status').value = '';
      document.getElementById('export-start').value = '';
      document.getElementById('export-end').value = '';
      openModal('modal-export');
    }

    async function executeExport() {
      const status = document.getElementById('export-status').value;
      const start = document.getElementById('export-start').value;
      const end = document.getElementById('export-end').value;

      try {
        showToast('데이터를 가져오는 중입니다...', 'info');
        
        // 엑셀 다운로드를 위해 페이지 제한 없이 많은 양의 데이터를 한 번에 가져옴
        const params = { page: 1, limit: 10000 };
        if (status) params.status = status;
        // 백엔드 지원 파라미터 가정
        if (start) params.start_date = start;
        if (end) params.end_date = end;

        const data = await WithdrawalsAPI.list(params);
        let rows = data.data || [];

        // 백엔드에서 날짜 필터링이 미지원될 경우를 대비한 프론트엔드 방어 필터링
        if (start) {
          rows = rows.filter(r => {
            const rDate = (r.request_date || r.created_at || '').substring(0, 10);
            return rDate >= start;
          });
        }
        if (end) {
          rows = rows.filter(r => {
            const rDate = (r.request_date || r.created_at || '').substring(0, 10);
            return rDate <= end;
          });
        }

        if (rows.length === 0) {
          showToast('해당 조건에 다운로드할 데이터가 없습니다.', 'warning');
          return;
        }

        // 이름, 은행, 계좌번호를 분리하여 엑셀용 데이터 객체 배열 생성
        const excelData = rows.map(r => {
          const wStatus = (r.status || '').toLowerCase();
          const statusStr = 
            (wStatus === 'paid' || wStatus === 'completed' || wStatus === 'done') ? '지급완료' :
            (wStatus === 'pending') ? '대기' :
            (wStatus === 'rejected') ? '거절' : wStatus;

          return {
            'ID No.': r.id,
            '회원 아이디': r.user_id,
            '이름': r.name,
            '은행명': r.bank_name || '-',
            '계좌번호': r.account_number || '-',
            '투자금액': r.investment_amount || 0,
            '주차': r.week_number || '-',
            '출금요청액': r.amount || 0,
            '신청일시': r.request_date || r.created_at || '-',
            '출금일시': r.withdraw_date || '-',
            '상태': statusStr
          };
        });

        // SheetJS를 사용하여 엑셀 워크북 생성
        const ws = XLSX.utils.json_to_sheet(excelData);
        
        // 열 너비(Column Widths) 적절히 조정
        ws['!cols'] = [
          { wch: 8 },  // ID No.
          { wch: 15 }, // 회원 아이디
          { wch: 10 }, // 이름
          { wch: 12 }, // 은행명
          { wch: 20 }, // 계좌번호
          { wch: 15 }, // 투자금액
          { wch: 8 },  // 주차
          { wch: 15 }, // 출금요청액
          { wch: 20 }, // 신청일시
          { wch: 20 }, // 출금일시
          { wch: 10 }  // 상태
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "출금내역");
        
        // 파일명 생성 (예: 출금내역_20260419.xlsx)
        const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
        const fileName = `투자금출금내역_${dateStr}.xlsx`;
        
        XLSX.writeFile(wb, fileName);
        
        closeModal('modal-export');
        showToast('엑셀 파일 다운로드가 완료되었습니다.', 'success');

      } catch (err) {
        showToast('엑셀 다운로드 실패: ' + err.message, 'error');
        console.error('Export Error:', err);
      }
    }
  </script>
</body>
</html>

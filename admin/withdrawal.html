<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DANGUN - 투자금 출금 관리</title>
  <script>(function(){var t=localStorage.getItem('dangun_token');var a=null;try{a=JSON.parse(localStorage.getItem('dangun_admin')||'null');}catch(e){}if(!t||!a||!a.id){localStorage.removeItem('dangun_token');localStorage.removeItem('dangun_admin');localStorage.removeItem('dangun_user');location.replace('/index.html');}})();</script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    .filter-bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
    .filter-bar .form-control { width:auto; min-width:120px; }
    /* 이자 지급 행 시각적 구분 */
    .row-payout { background: rgba(90, 123, 255, 0.04); }
    .row-payout:hover { background: rgba(90, 123, 255, 0.08) !important; }
    .badge-payout { font-size: 10px; background: rgba(90, 123, 255, 0.2); color: var(--accent-blue); padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="app-wrapper">
    <aside class="sidebar" style="background:linear-gradient(180deg,#0d0d1a 0%,#12122a 60%,#0f1535 100%);">
      <div class="sidebar-header">
        <a class="sidebar-logo" href="dashboard.html">
          <div class="logo-icon">D</div>
          <div class="logo-text"><span class="logo-name">DANGUN</span><span class="logo-sub">Admin Panel</span></div>
        </a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">메인</div>
        <a class="nav-item" href="dashboard.html"><span class="nav-icon"><i class="fas fa-chart-pie"></i></span> 대시보드</a>
        <div class="nav-section">회원 관리</div>
        <a class="nav-item" href="members.html"><span class="nav-icon"><i class="fas fa-users"></i></span> 회원 정보</a>
        <div class="nav-section">투자 관리</div>
        <a class="nav-item" href="deposit.html"><span class="nav-icon"><i class="fas fa-arrow-circle-down"></i></span> 투자금 입금</a>
        <a class="nav-item active" href="withdrawal.html"><span class="nav-icon"><i class="fas fa-arrow-circle-up"></i></span> 투자금 출금</a>
        <a class="nav-item" href="commission.html"><span class="nav-icon"><i class="fas fa-hand-holding-usd"></i></span> 직급 수당</a>
        <a class="nav-item" href="simulate.html"><span class="nav-icon"><i class="fas fa-play-circle"></i></span> 지급 시뮬레이션</a>
        <a class="nav-item" href="reset.html"><span class="nav-icon"><i class="fas fa-trash-alt"></i></span> 초기화/회원추가</a>
        <div class="nav-section" style="margin-top:16px;">설정</div>
        <a class="nav-item" href="settings.html"><span class="nav-icon"><i class="fas fa-cog"></i></span> 시스템 설정</a>
        <a class="nav-item" href="#" onclick="doLogout()"><span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span> 로그아웃</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar" style="background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;">A</div>
          <div class="user-info"><div class="user-name">최고관리자</div><div class="user-rank" style="color:var(--accent-red);">🛡 SuperAdmin</div></div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <span class="topbar-title"><i class="fas fa-arrow-circle-up" style="color:var(--accent-gold);margin-right:8px;"></i> 투자금 출금 관리</span>
        <div class="topbar-actions">
          <button class="btn btn-sm" style="background:rgba(39,174,96,0.15);border:1px solid rgba(39,174,96,0.4);color:var(--accent-green);" onclick="exportWithdrawCSV()">
            <i class="fas fa-file-excel"></i> 엑셀 다운로드
          </button>
          <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
            <i class="fas fa-moon" id="theme-icon"></i><span id="theme-label">라이트</span>
          </button>
        </div>
      </header>

      <div class="page-content">
        <!-- KPIs -->
        <div class="grid grid-4 mb-24" style="gap:14px;">
          <div class="stat-card anim-fadeInUp delay-1">
            <div class="stat-icon"><i class="fas fa-list"></i></div>
            <div class="stat-value" id="kpi-total-w">-</div><div class="stat-label">전체 내역 건수</div>
          </div>
          <div class="stat-card red anim-fadeInUp delay-2">
            <div class="stat-icon"><i class="fas fa-clock"></i></div>
            <div class="stat-value" id="kpi-pending-w">-</div><div class="stat-label">총 대기 건수</div>
          </div>
          <div class="stat-card green anim-fadeInUp delay-3">
            <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
            <div class="stat-value" id="kpi-done-w">-</div><div class="stat-label">처리 완료</div>
          </div>
          <div class="stat-card blue anim-fadeInUp delay-4">
            <div class="stat-icon"><i class="fas fa-coins"></i></div>
            <div class="stat-value" id="kpi-amount-w" style="font-size:18px;">-</div><div class="stat-label">대기 금액 합계</div>
          </div>
        </div>

        <!-- Bulk Actions + Table -->
        <div class="card anim-fadeInUp">
          <div class="card-header">
            <span class="card-title">
              <i class="fas fa-table icon"></i> 출금 및 지급 대기 내역 
              <span style="font-size:12px;font-weight:400;color:var(--text-muted);margin-left:8px;">(수동 출금 요청 및 금일 도래 자동 이자 지급 포함)</span>
            </span>
            <div style="display:flex;gap:8px;align-items:center;">
              <button class="btn btn-success btn-sm" onclick="bulkApprove()">
                <i class="fas fa-check-double"></i> 선택 일괄 승인/지급
              </button>
              <button class="btn btn-danger btn-sm" onclick="bulkReject()">
                <i class="fas fa-times-circle"></i> 선택 일괄 거절
              </button>
            </div>
          </div>
          <div class="card-body" style="padding:16px 20px 0;">
            <div class="filter-bar">
              <div class="input-icon-wrap" style="min-width:200px;">
                <i class="fas fa-search" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);"></i>
                <input type="text" class="form-control" id="search-w" placeholder="아이디, 이름 검색" oninput="filterWithdrawals()" style="padding-left:40px;">
              </div>
              <select class="form-control" id="filter-status-w" onchange="filterWithdrawals()">
                <option value="">전체 상태</option>
                <option value="pending" selected>대기 (프로 노출)</option>
                <option value="paid">지급완료</option>
                <option value="rejected">거절</option>
              </select>
              <label style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px;white-space:nowrap;cursor:pointer;">
                <input type="checkbox" id="show-all-w" onchange="filterWithdrawals()" style="accent-color:var(--accent-gold);">
                전체 보기
              </label>
              <input type="date" class="form-control" id="filter-date-w" onchange="filterWithdrawals()">
              <button class="btn btn-outline btn-sm" onclick="clearFiltersW()"><i class="fas fa-redo"></i></button>
            </div>
          </div>
          <div class="card-body" style="padding:0 0 16px;">
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th><input type="checkbox" id="check-all-w" onchange="toggleAllW(this)" style="accent-color:var(--accent-gold);"></th>
                    <th>아이디 / 구분</th>
                    <th>이름</th>
                    <th>은행 / 계좌</th>
                    <th>투자금</th>
                    <th>주차</th>
                    <th>출금/지급 금액</th>
                    <th>발생일/신청일</th>
                    <th>처리일</th>
                    <th>상태</th>
                    <th>처리</th>
                  </tr>
                </thead>
                <tbody id="withdrawal-tbody"></tbody>
              </table>
            </div>
            <div class="pagination" id="withdrawal-pagination"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Reject Modal -->
  <div class="modal-overlay" id="modal-reject">
    <div class="modal" style="max-width:420px;">
      <div class="modal-header">
        <span class="modal-title">출금 거절</span>
        <button class="modal-close" onclick="closeModal('modal-reject')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">거절 사유 <span style="color:var(--accent-red)">*</span></label>
          <textarea class="form-control" id="reject-reason" rows="3" placeholder="거절 사유를 입력하세요..." style="resize:vertical;"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('modal-reject')">취소</button>
        <button class="btn btn-danger" onclick="executeReject()"><i class="fas fa-ban"></i> 거절 처리</button>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/dgn.js"></script>
  <script>
    // ✅ 데이터 바인딩 시 렌더링 중단을 막아주는 안전(Fallback) 함수
    const safeFormatMoney = val => typeof formatMoney === 'function' ? formatMoney(val) : `₩${Number(val||0).toLocaleString()}`;
    const safeFormatDate = dt => {
      if (!dt) return '<span style="color:var(--text-muted);">-</span>';
      return typeof formatDate === 'function' ? formatDate(dt) : String(dt).split('T')[0];
    };
    const safeStatusBadge = st => typeof statusBadge === 'function' ? statusBadge(st) : (st||'-');

    let currentPageW  = 1;
    let totalCountW   = 0;
    const PAGE_LIMIT_W = 10;
    let rejectTargetId = null;

    document.addEventListener('DOMContentLoaded', async () => {
      if(typeof applyTheme === 'function') applyTheme(typeof getTheme === 'function' ? getTheme() : 'dark');
      if (window.DGN) await DGN.init().catch(()=>{});
      loadWithdrawals();
    });

    async function loadWithdrawals() {
      const q       = document.getElementById('search-w').value.trim();
      let   status  = document.getElementById('filter-status-w').value;
      const showAll = document.getElementById('show-all-w')?.checked || false;
      const params  = { page: currentPageW, limit: PAGE_LIMIT_W };
      
      if (q) params.search = q;
      // "전체 보기" 켜지 않으면 pending 강제 노출
      if (!showAll && !status) status = 'pending';
      if (status) params.status = status;

      try {
        // 1. 일반 수동 출금 내역 (Withdrawals) 가져오기 - 빈 값 및 타입 에러 원천 차단 (?. 사용)
        const wDataRes = await WithdrawalsAPI.list(params);
        let rows = (wDataRes?.data || []).map(w => ({...(w || {}), _type: 'withdrawal'}));

        // 2. 대시보드의 주차별 이자 자동지급 (Payouts - weekly_pending) 가져오기 및 날짜 필터링
        if (currentPageW === 1 && (status === 'pending' || !status)) {
          try {
            const dDataRes = await DashboardAPI.admin();
            let payoutRows = dDataRes?.weekly_pending || [];
            
            // ✅ 완벽한 날짜 필터링: 자정(00시) 기준 순수비교, 미래 일자 강력 차단
            const today = new Date();
            today.setHours(0, 0, 0, 0); 
            
            payoutRows = payoutRows.filter(p => {
              if (p?.status && p.status !== 'pending') return true; 

              let targetDateStr = p?.payout_date || p?.due_date || p?.expected_date || p?.target_date;
              let targetDate = null;

              if (targetDateStr) {
                targetDate = new Date(targetDateStr);
              } else if (p?.week_number) {
                // 백엔드에서 날짜를 주지 않았다면, 가입일/투자일 기준으로 계산
                let baseDateStr = p?.investment_date || p?.invest_date || p?.created_at;
                if (baseDateStr) {
                   targetDate = new Date(baseDateStr);
                   targetDate.setDate(targetDate.getDate() + (parseInt(p.week_number) * 7));
                }
              }

              // 날짜 도출이 가능하고, 그 날짜가 오늘보다 미래라면 화면 및 계산에서 완전히 제거!
              if (targetDate && !isNaN(targetDate.getTime())) {
                targetDate.setHours(0, 0, 0, 0);
                if (targetDate.getTime() > today.getTime()) {
                    return false; 
                }
              }
              
              return true;
            });
            
            // 검색어가 있으면 Payout 데이터도 필터링
            if (q) {
              payoutRows = payoutRows.filter(p => 
                (p?.user_id && p.user_id.toLowerCase().includes(q.toLowerCase())) || 
                (p?.name && p.name.toLowerCase().includes(q.toLowerCase()))
              );
            }
            
            // 타입 태그 부착
            payoutRows = payoutRows.map(p => ({...(p || {}), _type: 'payout'}));
            
            // 리스트 최상단에 이자 지급(Payout) 내역 병합
            rows = [...payoutRows, ...rows];

            // Payout 관련 건수 및 금액을 KPI 데이터에 합산 (옵셔널 체이닝으로 방어)
            wDataRes.stats = wDataRes?.stats || {};
            wDataRes.stats.pending_count = (wDataRes.stats.pending_count || 0) + payoutRows.length;
            wDataRes.stats.total_count   = (wDataRes.stats.total_count || 0) + payoutRows.length;
            
            const payoutAmountSum = payoutRows.reduce((acc, p) => acc + (Number(p?.total_payout || p?.amount || 0) || 0), 0);
            wDataRes.stats.pending_amount = (wDataRes.stats.pending_amount || 0) + payoutAmountSum;

          } catch(e) { console.warn('Dashboard Payout data load failed:', e); }
        }

        totalCountW = wDataRes?.total || 0;

        // 3. KPI 렌더링 반영
        const s = wDataRes?.stats || {};
        const setEl = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };
        setEl('kpi-total-w',   s.total_count   || wDataRes?.total || 0);
        setEl('kpi-pending-w', s.pending_count || 0);
        setEl('kpi-done-w',    s.paid_count    || 0);
        
        const kpiAmtEl = document.getElementById('kpi-amount-w');
        if (kpiAmtEl) kpiAmtEl.innerHTML = safeFormatMoney(s.pending_amount || 0) + (window.DGN ? DGN.html(s.pending_amount || 0) : '');

        // 4. 합쳐진 테이블 렌더링
        renderWithdrawalTable(rows);

      } catch(err) {
        if(typeof showToast === 'function') showToast('출금 목록 로드 실패: ' + err?.message, 'error');
      }
    }

    function filterWithdrawals() {
      currentPageW = 1;
      loadWithdrawals();
    }

    function clearFiltersW() {
      document.getElementById('search-w').value = '';
      document.getElementById('filter-status-w').value = 'pending';
      const showAllEl = document.getElementById('show-all-w');
      if (showAllEl) showAllEl.checked = false;
      currentPageW = 1;
      loadWithdrawals();
    }

    function renderWithdrawalTable(rows) {
      if (!rows || !rows.length) {
        document.getElementById('withdrawal-tbody').innerHTML =
          `<tr><td colspan="12" style="text-align:center;padding:24px;color:var(--text-muted);">조회된 출금 및 지급 내역이 없습니다.</td></tr>`;
      } else {
        document.getElementById('withdrawal-tbody').innerHTML = rows.map(w => {
          const isPayout = w?._type === 'payout';
          const rowId    = isPayout ? `prow-${w?.id}` : `wrow-${w?.id}`;
          const typeBdg  = isPayout ? `<span class="badge-payout">이자지급</span>` : '';
          const trClass  = isPayout ? 'row-payout' : '';
          
          // 출금/지급 표시 금액 분기 처리
          const displayAmount = isPayout ? (w?.total_payout || w?.payout_amount || 0) : (w?.amount || 0);
          
          // ✅ 핵심 수정부: undefined 속성 접근 에러 방지용 완벽 매핑
          // w.investment 가 null 이라도 w?.investment?.amount 형태로 접근하여 절대 에러가 나지 않음.
          let invAmt = w?.investment_amount ?? w?.invest_amount ?? w?.principal ?? w?.principal_amount ?? w?.investment?.amount;
          
          // 만약 데이터가 이자지급(Payout)인데도 투자금 필드가 다 비어있다면 최후의 보루로 w.amount를 확인
          if (isPayout && (invAmt === undefined || invAmt === null)) {
             invAmt = w?.amount;
          }

          // 그래도 없으면 0이 아니라 대시(-) 처리
          const formattedInvestment = (invAmt !== undefined && invAmt !== null && invAmt !== '') 
              ? safeFormatMoney(invAmt) 
              : '<span style="color:var(--text-muted);" title="데이터를 불러올 수 없습니다.">-</span>';

          const weekTag = w?.week_number ? `<span class="badge badge-blue">${w.week_number}주차</span>` : '-';
          
          // 버튼 및 액션 분기 처리
          let actionHtml = '';
          if (w?.status === 'pending') {
            if (isPayout) {
              actionHtml = `
                <div style="display:flex;gap:4px;">
                  <button class="btn btn-success btn-sm" style="padding:4px 10px;font-size:11px;" onclick="approvePayoutItem(${w?.id})">
                    <i class="fas fa-check"></i> 자동지급 승인
                  </button>
                </div>`;
            } else {
              actionHtml = `
                <div style="display:flex;gap:4px;">
                  <button class="btn btn-success btn-sm" style="padding:4px 10px;font-size:11px;" onclick="approveOne(${w?.id})">
                    <i class="fas fa-check"></i> 출금 승인
                  </button>
                  <button class="btn btn-danger btn-sm" style="padding:4px 8px;font-size:11px;" onclick="openReject(${w?.id})">
                    <i class="fas fa-times"></i>
                  </button>
                </div>`;
            }
          } else {
            actionHtml = `<span style="font-size:11px;color:var(--text-muted);">처리완료</span>`;
          }

          return `
            <tr id="${rowId}" class="${trClass}">
              <td><input type="checkbox" class="list-checkbox" data-id="${w?.id}" data-type="${w?._type}" style="accent-color:var(--accent-gold);" ${w?.status !== 'pending' ? 'disabled' : ''}></td>
              <td style="font-weight:700;">${w?.user_id || '-'} ${typeBdg}</td>
              <td>${w?.name || '-'}</td>
              <td style="font-size:12px;">${w?.bank_name||'-'}<br><span style="color:var(--text-muted);">${w?.account_number||'-'}</span></td>
              <td style="font-family:'Orbitron',sans-serif;font-size:12px;">${formattedInvestment}</td>
              <td>${weekTag}</td>
              <td style="font-weight:700;color:${isPayout ? 'var(--accent-blue)' : 'var(--accent-gold)'};">${safeFormatMoney(displayAmount)}</td>
              <td style="font-size:12px;">${safeFormatDate(w?.request_date||w?.created_at)}</td>
              <td style="font-size:12px;">${safeFormatDate(w?.withdraw_date||w?.paid_at)}</td>
              <td id="status-${w?._type}-${w?.id}">${safeStatusBadge(w?.status)}</td>
              <td id="action-${w?._type}-${w?.id}">${actionHtml}</td>
            </tr>
          `;
        }).join('');
      }

      if(typeof renderPagination === 'function') {
        renderPagination('withdrawal-pagination', totalCountW, currentPageW, PAGE_LIMIT_W,
          `function(p){ currentPageW=p; loadWithdrawals(); }`);
      }
    }

    // --- 수동 출금 요청 개별 처리 ---
    async function approveOne(id) {
      try {
        await WithdrawalsAPI.approve(id);
        if(typeof showToast === 'function') showToast('출금 승인 처리 완료', 'success');
        await loadWithdrawals();
      } catch(err) { if(typeof showToast === 'function') showToast(err?.message, 'error'); }
    }

    function openReject(id) {
      rejectTargetId = id;
      document.getElementById('reject-reason').value = '';
      if(typeof openModal === 'function') openModal('modal-reject');
    }

    async function executeReject() {
      const reason = document.getElementById('reject-reason').value.trim();
      if (!reason) { if(typeof showToast === 'function') showToast('거절 사유를 입력하세요.', 'warning'); return; }
      try {
        await WithdrawalsAPI.reject(rejectTargetId, reason);
        if(typeof showToast === 'function') showToast('출금 거절 처리 완료', 'warning');
        if(typeof closeModal === 'function') closeModal('modal-reject');
        await loadWithdrawals();
      } catch(err) { if(typeof showToast === 'function') showToast(err?.message, 'error'); }
    }

    // --- 자동 이자 지급 개별 처리 (Payout) ---
    async function approvePayoutItem(payoutId) {
      if(!confirm('해당 주차 이자를 지급 처리하시겠습니까?')) return;
      try {
        await InvestmentsAPI.payOne(payoutId);
        if(typeof showToast === 'function') showToast('지급 처리 완료', 'success');
        await loadWithdrawals();
      } catch(err) { if(typeof showToast === 'function') showToast(err?.message, 'error'); }
    }

    // --- 일괄 승인 / 지급 하이브리드 처리 ---
    async function bulkApprove() {
      const checked = document.querySelectorAll('.list-checkbox:checked:not(:disabled)');
      if (checked.length === 0) { if(typeof showToast === 'function') showToast('선택된 대기 항목이 없습니다.', 'warning'); return; }
      
      const wIds = []; // 일반 출금 ID
      const pIds = []; // Payout ID
      
      checked.forEach(cb => {
        if(cb.dataset.type === 'payout') pIds.push(parseInt(cb.dataset.id));
        else wIds.push(parseInt(cb.dataset.id));
      });

      if(!confirm(`총 ${checked.length}건 (일반출금 ${wIds.length}건, 이자지급 ${pIds.length}건)을 일괄 처리하시겠습니까?`)) return;

      try {
        let successCount = 0;
        // 일반 출금 API 전송
        if(wIds.length > 0) {
          await WithdrawalsAPI.bulkApprove(wIds);
          successCount += wIds.length;
        }
        // 이자 지급 API 전송
        if(pIds.length > 0) {
          await InvestmentsAPI.bulkPay(pIds);
          successCount += pIds.length;
        }
        
        if(typeof showToast === 'function') showToast(`${successCount}건 일괄 처리 완료`, 'success');
        document.getElementById('check-all-w').checked = false;
        await loadWithdrawals();
      } catch(err) { if(typeof showToast === 'function') showToast('일괄 처리 중 오류 발생: ' + err?.message, 'error'); }
    }

    // --- 일괄 거절 처리 (일반 출금 건만 허용) ---
    async function bulkReject() {
      const checked = document.querySelectorAll('.list-checkbox:checked:not(:disabled)');
      if (checked.length === 0) { if(typeof showToast === 'function') showToast('선택된 대기 항목이 없습니다.', 'warning'); return; }
      
      const pChecked = Array.from(checked).filter(cb => cb.dataset.type === 'payout');
      if (pChecked.length > 0) {
        if(typeof showToast === 'function') showToast('이자 자동 지급 내역은 거절 처리할 수 없습니다. 선택을 해제해주세요.', 'warning');
        return;
      }

      const reason = prompt('일괄 거절 사유를 입력하세요:');
      if (!reason) return;
      
      const ids = [...checked].map(cb => parseInt(cb.dataset.id));
      let cnt = 0;
      for (const id of ids) {
        try { await WithdrawalsAPI.reject(id, reason); cnt++; } catch {}
      }
      if(typeof showToast === 'function') showToast(`${cnt}건 거절 처리 완료`, 'warning');
      await loadWithdrawals();
    }

    function toggleAllW(el) {
      document.querySelectorAll('.list-checkbox:not(:disabled)').forEach(cb => cb.checked = el.checked);
    }

    // --- CSV 엑셀 다운로드 (통합 데이터용) ---
    async function exportWithdrawCSV() {
      try {
        if(typeof showToast === 'function') showToast('엑셀 생성 중입니다...', 'info');
        const q       = document.getElementById('search-w').value.trim();
        let   status  = document.getElementById('filter-status-w').value;
        const showAll = document.getElementById('show-all-w')?.checked || false;
        const params  = { page: 1, limit: 9999 };
        
        if (q) params.search = q;
        if (!showAll && !status) status = 'pending';
        if (status) params.status = status;

        // 1. 일반 출금 전체 로드
        const wDataRes = await WithdrawalsAPI.list(params);
        let rows = (wDataRes?.data || []).map(w => ({...(w || {}), _type: 'withdrawal'}));

        // 2. 이자 지급 전체 로드 병합 및 필터링 (동일한 방어/날짜 로직 적용)
        if (status === 'pending' || !status) {
          try {
            const dDataRes = await DashboardAPI.admin();
            let pRows = dDataRes?.weekly_pending || [];
            
            const today = new Date();
            today.setHours(0,0,0,0);
            
            pRows = pRows.filter(p => {
              if(p?.status && p.status !== 'pending') return true;
              
              let targetDateStr = p?.payout_date || p?.due_date || p?.expected_date || p?.target_date;
              let targetDate = null;

              if (targetDateStr) {
                targetDate = new Date(targetDateStr);
              } else if (p?.week_number) {
                let baseDateStr = p?.investment_date || p?.invest_date || p?.created_at;
                if (baseDateStr) {
                   targetDate = new Date(baseDateStr);
                   targetDate.setDate(targetDate.getDate() + (parseInt(p.week_number) * 7));
                }
              }

              if (targetDate && !isNaN(targetDate.getTime())) {
                targetDate.setHours(0,0,0,0);
                if(targetDate.getTime() > today.getTime()) return false;
              }
              
              return true;
            });

            if(q) {
              pRows = pRows.filter(p => (p?.user_id && p.user_id.toLowerCase().includes(q.toLowerCase())) || (p?.name && p.name.toLowerCase().includes(q.toLowerCase())));
            }
            pRows = pRows.map(p => ({...(p || {}), _type: 'payout'}));
            rows = [...pRows, ...rows];
          } catch(e) {}
        }

        if (!rows || !rows.length) { if(typeof showToast === 'function') showToast('다운로드할 데이터가 없습니다.', 'warning'); return; }

        const stMap = { pending:'대기', paid:'지급완료', rejected:'거절' };
        const BOM    = '\uFEFF';
        const header = ['구분', '이름', '아이디', '은행명', '계좌번호', '투자금액(원)', '주차', '출금(지급)금액(원)', '신청일(발생일)', '상태'].join(',');
        
        const csvRows = rows.map(w => {
          const isPayout = w?._type === 'payout';
          const typeName = isPayout ? '주간이자지급' : '수동출금요청';
          const amount   = isPayout ? (w?.total_payout || w?.payout_amount || 0) : (w?.amount || 0);
          const rDate    = w?.request_date || w?.created_at;
          
          let invAmt = w?.investment_amount ?? w?.invest_amount ?? w?.principal ?? w?.principal_amount ?? w?.investment?.amount;
          if (isPayout && (invAmt === undefined || invAmt === null)) {
             invAmt = w?.amount;
          }

          return [
            `"${typeName}"`,
            `"${(w?.name||'').replace(/"/g,'""')}"`,
            `"${(w?.user_id||'').replace(/"/g,'""')}"`,
            `"${(w?.bank_name||'').replace(/"/g,'""')}"`,
            `"${(w?.account_number||'').replace(/"/g,'""')}"`,
            invAmt || 0,
            w?.week_number || '',
            amount,
            `"${rDate ? safeFormatDate(rDate) : '-'}"`,
            `"${stMap[w?.status] || w?.status || '-'}"`
          ].join(',');
        });

        const csv  = BOM + header + '\n' + csvRows.join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `출금및지급내역_${new Date().toISOString().slice(0,10)}.csv`;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 300);
        if(typeof showToast === 'function') showToast(`총 ${rows.length}건 엑셀 다운로드 완료`, 'success');
      } catch(err) {
        if(typeof showToast === 'function') showToast('다운로드 실패: ' + err?.message, 'error');
      }
    }
  </script>

<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DANGUN - 회원 정보 관리</title>
  <script>(function(){var t=localStorage.getItem('dangun_token');var a=null;try{a=JSON.parse(localStorage.getItem('dangun_admin')||'null');}catch(e){}if(!t||!a||!a.id){localStorage.removeItem('dangun_token');localStorage.removeItem('dangun_admin');localStorage.removeItem('dangun_user');location.replace('/index.html');}})();</script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    .filter-bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
    .filter-bar .form-control { width:auto; min-width:130px; }
    .search-input { min-width:220px; }
    .member-cell { display:flex; align-items:center; gap:10px; }
    .rank-select { padding:4px 8px; border-radius:6px; font-size:11px; font-weight:700; border:1px solid var(--border-color); background:var(--bg-input); color:var(--text-primary); cursor:pointer; }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="app-wrapper">
    <aside class="sidebar" style="background:linear-gradient(180deg,#0d0d1a 0%,#12122a 60%,#0f1535 100%);">
      <div class="sidebar-header">
        <a class="sidebar-logo" href="dashboard.html">
          <div class="logo-icon">D</div>
          <div class="logo-text"><span class="logo-name">DANGUN</span><span class="logo-sub">Admin Panel</span></div>
        </a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">메인</div>
        <a class="nav-item" href="dashboard.html"><span class="nav-icon"><i class="fas fa-chart-pie"></i></span> 대시보드</a>
        <div class="nav-section">회원 관리</div>
        <a class="nav-item active" href="members.html"><span class="nav-icon"><i class="fas fa-users"></i></span> 회원 정보</a>
        <div class="nav-section">투자 관리</div>
        <a class="nav-item" href="deposit.html"><span class="nav-icon"><i class="fas fa-arrow-circle-down"></i></span> 투자금 입금</a>
        <a class="nav-item" href="withdrawal.html"><span class="nav-icon"><i class="fas fa-arrow-circle-up"></i></span> 투자금 출금</a>
        <a class="nav-item" href="commission.html"><span class="nav-icon"><i class="fas fa-hand-holding-usd"></i></span> 직급 수당</a>
        <a class="nav-item" href="simulate.html"><span class="nav-icon"><i class="fas fa-play-circle"></i></span> 지급 시뮬레이션</a>
        <a class="nav-item" href="backup.html"><span class="nav-icon"><i class="fas fa-database"></i></span> 백업 / 복원</a>
        <a class="nav-item" href="reset.html"><span class="nav-icon"><i class="fas fa-trash-alt"></i></span> 초기화/회원추가</a>
        <div class="nav-section" style="margin-top:16px;">설정</div>
        <a class="nav-item" href="settings.html"><span class="nav-icon"><i class="fas fa-cog"></i></span> 시스템 설정</a>
        <a class="nav-item" href="#" onclick="doLogout()"><span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span> 로그아웃</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar" style="background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;">A</div>
          <div class="user-info"><div class="user-name">최고관리자</div><div class="user-rank" style="color:var(--accent-red);">🛡 SuperAdmin</div></div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <span class="topbar-title"><i class="fas fa-users" style="color:var(--accent-gold);margin-right:8px;"></i> 회원 정보 관리</span>
        <div class="topbar-actions">
          <button class="btn btn-gold btn-sm" onclick="openModal('modal-add-member')" style="margin-right:8px;">
            <i class="fas fa-user-plus"></i> 회원 추가
          </button>
          <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
            <i class="fas fa-moon" id="theme-icon"></i><span id="theme-label">라이트</span>
          </button>
        </div>
      </header>

      <div class="page-content">

        <!-- Summary (DB 연동) -->
        <div class="grid grid-4 mb-24" style="gap:14px;">
          <div class="stat-card anim-fadeInUp delay-1">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <div class="stat-value" id="stat-total">-</div><div class="stat-label">전체 회원</div>
          </div>
          <div class="stat-card blue anim-fadeInUp delay-2">
            <div class="stat-icon"><i class="fas fa-user-check"></i></div>
            <div class="stat-value" id="stat-active">-</div><div class="stat-label">활성 회원</div>
          </div>
          <div class="stat-card anim-fadeInUp delay-3" style="--accent-gold:#8e44ad;">
            <div class="stat-icon" style="background:rgba(142,68,173,0.1);color:#9b59b6;"><i class="fas fa-star"></i></div>
            <div class="stat-value" id="stat-teamjang">-</div><div class="stat-label">팀장 이상</div>
          </div>
          <div class="stat-card red anim-fadeInUp delay-4">
            <div class="stat-icon"><i class="fas fa-user-clock"></i></div>
            <div class="stat-value" id="stat-inactive">-</div><div class="stat-label">승인 대기</div>
          </div>
        </div>

        <!-- Filter + Table -->
        <div class="card anim-fadeInUp">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-table icon"></i> 회원 목록</span>
            <button class="btn btn-gold btn-sm" onclick="exportCSV()"><i class="fas fa-download"></i> 내보내기</button>
          </div>
          <div class="card-body" style="padding:16px 20px 0;">
            <div class="filter-bar">
              <div class="input-icon-wrap" style="flex:1;min-width:220px;">
                <i class="fas fa-search" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);"></i>
                <input type="text" class="form-control search-input" id="search-input" placeholder="아이디, 이름, 전화번호 검색" oninput="filterMembers()" style="padding-left:40px;">
              </div>
              <select class="form-control" id="filter-rank" onchange="filterMembers()">
                <option value="">전체 직급</option>
                <option value="일반회원">일반회원</option>
                <option value="팀장">팀장</option>
                <option value="본부장">본부장</option>
              </select>
              <select class="form-control" id="filter-status" onchange="filterMembers()">
                <option value="">전체 상태</option>
                <option value="active">활성</option>
                <option value="inactive">미활성</option>
                <option value="suspended">정지</option>
              </select>
              <button class="btn btn-outline btn-sm" onclick="clearFilters()"><i class="fas fa-redo"></i> 초기화</button>
            </div>
          </div>
          <div class="card-body" style="padding:0 0 16px;">
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>아이디</th>
                    <th>이름</th>
                    <th>전화번호</th>
                    <th>추천인 아이디<br><span style="font-weight:400;color:var(--text-muted);font-size:10px;">(referrer_id)</span></th>
                    <th>은행/계좌</th>
                    <th>직급</th>
                    <th>투자금</th>
                    <th>주차</th>
                    <th>잔여 지급액</th>
                    <th>가입일</th>
                    <th>상태</th>
                    <th>관리</th>
                  </tr>
                </thead>
                <tbody id="members-tbody"></tbody>
              </table>
            </div>
            <div class="pagination" id="members-pagination"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Add Member Modal -->
  <div class="modal-overlay" id="modal-add-member">
    <div class="modal" style="max-width:640px;max-height:90vh;overflow-y:auto;">
      <div class="modal-header">
        <span class="modal-title"><i class="fas fa-user-plus" style="color:var(--accent-gold);margin-right:8px;"></i> 회원 추가</span>
        <button class="modal-close" onclick="closeModal('modal-add-member')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <form id="add-member-form" onsubmit="submitAddMember(event)">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
            <div class="form-group">
              <label class="form-label">아이디 <span style="color:#e74c3c;">*</span></label>
              <input type="text" class="form-control" id="am-user-id" placeholder="영문+숫자 6~20자" required minlength="6" maxlength="20" autocomplete="off">
            </div>
            <div class="form-group">
              <label class="form-label">이름 <span style="color:#e74c3c;">*</span></label>
              <input type="text" class="form-control" id="am-name" placeholder="실명 입력" required>
            </div>
            <div class="form-group">
              <label class="form-label">비밀번호 <span style="color:#e74c3c;">*</span></label>
              <input type="password" class="form-control" id="am-password" placeholder="8자 이상" required minlength="8">
            </div>
            <div class="form-group">
              <label class="form-label">핸드폰 <span style="color:#e74c3c;">*</span></label>
              <input type="tel" class="form-control" id="am-phone" placeholder="010-0000-0000" required>
            </div>
            <div class="form-group">
              <label class="form-label">이메일</label>
              <input type="email" class="form-control" id="am-email" placeholder="(optional)">
            </div>
            <div class="form-group">
              <label class="form-label">은행명</label>
              <select class="form-control" id="am-bank">
                <option value="">은행 선택</option>
                <option>국민은행</option><option>신한은행</option><option>우리은행</option>
                <option>하나은행</option><option>농협은행</option><option>기업은행</option>
                <option>SC제일은행</option><option>카카오백크</option><option>토스뱅크</option>
                <option>케이뱅크</option><option>새마을금고</option><option>수협은행</option>
                <option>우체국</option><option>씨티은행</option><option>기타</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">계좌번호</label>
              <input type="text" class="form-control" id="am-account" placeholder="- 없이 입력">
            </div>
            <div class="form-group">
              <label class="form-label">예금주 성명</label>
              <input type="text" class="form-control" id="am-holder" placeholder="예금주 이름">
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
            <div class="form-group">
              <label class="form-label">직급</label>
              <select class="form-control" id="am-rank">
                <option value="일반회원">일반회원</option>
                <option value="팀장">팀장</option>
                <option value="본부장">본부장</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">상태</label>
              <select class="form-control" id="am-status">
                <option value="active">활성 (즉시승인)</option>
                <option value="inactive">대기</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:12px;">
            <label class="form-label">추천인 검색 (선택)</label>
            <div style="display:flex;gap:8px;">
              <input type="text" class="form-control" id="am-recommender-input" placeholder="아이디 또는 이름 검색 (2자 이상)" oninput="searchAdminRecommender()">
              <input type="hidden" id="am-recommender-id">
            </div>
            <div id="am-recommender-result" style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;margin-top:4px;display:none;max-height:160px;overflow-y:auto;"></div>
            <div id="am-recommender-selected" style="display:none;margin-top:6px;padding:8px 12px;background:rgba(212,160,23,0.1);border:1px solid rgba(212,160,23,0.3);border-radius:8px;font-size:13px;">
              ✓ <span id="am-recommender-text"></span>
              <span onclick="clearAdminRecommender()" style="cursor:pointer;margin-left:8px;color:var(--text-muted);"><i class="fas fa-times"></i></span>
            </div>
          </div>
          <div id="add-member-error" style="display:none;padding:10px;background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);border-radius:8px;font-size:13px;color:#e74c3c;margin-bottom:12px;"></div>
          <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button type="button" class="btn btn-outline" onclick="closeModal('modal-add-member')">취소</button>
            <button type="submit" class="btn btn-gold" id="add-member-submit-btn">
              <i class="fas fa-user-plus"></i> 회원 등록
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal-member-detail">
    <div class="modal" style="max-width:580px;">
      <div class="modal-header">
        <span class="modal-title"><i class="fas fa-user-circle" style="color:var(--accent-gold);margin-right:8px;"></i> 회원 상세 정보</span>
        <button class="modal-close" onclick="closeModal('modal-member-detail')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="member-detail-body"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('modal-member-detail')">닫기</button>
        <button class="btn btn-gold" onclick="saveRankChange()"><i class="fas fa-save"></i> 저장</button>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script>
    // ── 공통 DGN 환율 스크립트 ──
    let _coinRate = 0;
    let _coinSymbol = 'DGN';
    let _coinEnabled = false;

    async function loadCoinInfo() {
      try {
        const d = await SettingsAPI.getPublic();
        _coinRate = parseFloat(d.dangun_coin_rate || '0') || 0;
        _coinSymbol = d.dangun_coin_symbol || 'DGN';
        _coinEnabled = d.dangun_coin_enabled !== '0';
      } catch(e) {}
    }

    function getDGNHtml(krw) {
      if (!_coinEnabled || _coinRate <= 0 || !krw) return '';
      const dgn = Math.round(krw * _coinRate);
      return `<div style="font

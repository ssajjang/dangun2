<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DANGUN - 회원 정보 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    .filter-bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
    .filter-bar .form-control { width:auto; min-width:130px; }
    .search-input { min-width:220px; }
    .member-cell { display:flex; align-items:center; gap:10px; }
    .rank-select { padding:4px 8px; border-radius:6px; font-size:11px; font-weight:700; border:1px solid var(--border-color); background:var(--bg-input); color:var(--text-primary); cursor:pointer; }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="app-wrapper">
    <aside class="sidebar" style="background:linear-gradient(180deg,#0d0d1a 0%,#12122a 60%,#0f1535 100%);">
      <div class="sidebar-header">
        <a class="sidebar-logo" href="dashboard.html">
          <div class="logo-icon">D</div>
          <div class="logo-text"><span class="logo-name">DANGUN</span><span class="logo-sub">Admin Panel</span></div>
        </a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">메인</div>
        <a class="nav-item" href="dashboard.html"><span class="nav-icon"><i class="fas fa-chart-pie"></i></span> 대시보드</a>
        <div class="nav-section">회원 관리</div>
        <a class="nav-item active" href="members.html"><span class="nav-icon"><i class="fas fa-users"></i></span> 회원 정보</a>
        <div class="nav-section">투자 관리</div>
        <a class="nav-item" href="deposit.html"><span class="nav-icon"><i class="fas fa-arrow-circle-down"></i></span> 투자금 입금</a>
        <a class="nav-item" href="withdrawal.html"><span class="nav-icon"><i class="fas fa-arrow-circle-up"></i></span> 투자금 출금</a>
        <a class="nav-item" href="commission.html"><span class="nav-icon"><i class="fas fa-hand-holding-usd"></i></span> 직급 수당</a>
        <a class="nav-item" href="simulate.html"><span class="nav-icon"><i class="fas fa-play-circle"></i></span> 지급 시뮬레이션</a>
        <a class="nav-item" href="reset.html"><span class="nav-icon"><i class="fas fa-trash-alt"></i></span> 초기화/회원추가</a>
        <div class="nav-section" style="margin-top:16px;">설정</div>
        <a class="nav-item" href="#" onclick="doLogout()"><span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span> 로그아웃</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar" style="background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;">A</div>
          <div class="user-info"><div class="user-name">최고관리자</div><div class="user-rank" style="color:var(--accent-red);">🛡 SuperAdmin</div></div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <span class="topbar-title"><i class="fas fa-users" style="color:var(--accent-gold);margin-right:8px;"></i> 회원 정보 관리</span>
        <div class="topbar-actions">
          <button class="btn btn-gold btn-sm" onclick="openModal('modal-add-member')" style="margin-right:8px;">
            <i class="fas fa-user-plus"></i> 회원 추가
          </button>
          <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
            <i class="fas fa-moon" id="theme-icon"></i><span id="theme-label">라이트</span>
          </button>
        </div>
      </header>

      <div class="page-content">

        <!-- Summary -->
        <div class="grid grid-4 mb-24" style="gap:14px;">
          <div class="stat-card anim-fadeInUp delay-1">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <div class="stat-value">128</div><div class="stat-label">전체 회원</div>
          </div>
          <div class="stat-card blue anim-fadeInUp delay-2">
            <div class="stat-icon"><i class="fas fa-user-check"></i></div>
            <div class="stat-value">112</div><div class="stat-label">활성 회원</div>
          </div>
          <div class="stat-card anim-fadeInUp delay-3" style="--accent-gold:#8e44ad;">
            <div class="stat-icon" style="background:rgba(142,68,173,0.1);color:#9b59b6;"><i class="fas fa-star"></i></div>
            <div class="stat-value">23</div><div class="stat-label">팀장 이상</div>
          </div>
          <div class="stat-card red anim-fadeInUp delay-4">
            <div class="stat-icon"><i class="fas fa-user-clock"></i></div>
            <div class="stat-value">3</div><div class="stat-label">승인 대기</div>
          </div>
        </div>

        <!-- Filter + Table -->
        <div class="card anim-fadeInUp">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-table icon"></i> 회원 목록</span>
            <button class="btn btn-gold btn-sm" onclick="exportCSV()"><i class="fas fa-download"></i> 내보내기</button>
          </div>
          <div class="card-body" style="padding:16px 20px 0;">
            <div class="filter-bar">
              <div class="input-icon-wrap" style="flex:1;min-width:220px;">
                <i class="fas fa-search" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);"></i>
                <input type="text" class="form-control search-input" id="search-input" placeholder="아이디, 이름, 전화번호 검색" oninput="filterMembers()" style="padding-left:40px;">
              </div>
              <select class="form-control" id="filter-rank" onchange="filterMembers()">
                <option value="">전체 직급</option>
                <option value="일반회원">일반회원</option>
                <option value="팀장">팀장</option>
                <option value="본부장">본부장</option>
              </select>
              <select class="form-control" id="filter-status" onchange="filterMembers()">
                <option value="">전체 상태</option>
                <option value="active">활성</option>
                <option value="inactive">미활성</option>
                <option value="suspended">정지</option>
              </select>
              <button class="btn btn-outline btn-sm" onclick="clearFilters()"><i class="fas fa-redo"></i> 초기화</button>
            </div>
          </div>
          <div class="card-body" style="padding:0 0 16px;">
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>아이디</th>
                    <th>이름</th>
                    <th>전화번호</th>
                    <th>은행/계좌</th>
                    <th>직급</th>
                    <th>투자금</th>
                    <th>주차</th>
                    <th>잔여 지급액</th>
                    <th>가입일</th>
                    <th>상태</th>
                    <th>관리</th>
                  </tr>
                </thead>
                <tbody id="members-tbody"></tbody>
              </table>
            </div>
            <div class="pagination" id="members-pagination"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Add Member Modal -->
  <div class="modal-overlay" id="modal-add-member">
    <div class="modal" style="max-width:640px;max-height:90vh;overflow-y:auto;">
      <div class="modal-header">
        <span class="modal-title"><i class="fas fa-user-plus" style="color:var(--accent-gold);margin-right:8px;"></i> 회원 추가</span>
        <button class="modal-close" onclick="closeModal('modal-add-member')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <form id="add-member-form" onsubmit="submitAddMember(event)">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
            <div class="form-group">
              <label class="form-label">아이디 <span style="color:#e74c3c;">*</span></label>
              <input type="text" class="form-control" id="am-user-id" placeholder="영문+숫자 6~20자" required minlength="6" maxlength="20" autocomplete="off">
            </div>
            <div class="form-group">
              <label class="form-label">이름 <span style="color:#e74c3c;">*</span></label>
              <input type="text" class="form-control" id="am-name" placeholder="실명 입력" required>
            </div>
            <div class="form-group">
              <label class="form-label">비밀번호 <span style="color:#e74c3c;">*</span></label>
              <input type="password" class="form-control" id="am-password" placeholder="8자 이상" required minlength="8">
            </div>
            <div class="form-group">
              <label class="form-label">핸드폰 <span style="color:#e74c3c;">*</span></label>
              <input type="tel" class="form-control" id="am-phone" placeholder="010-0000-0000" required>
            </div>
            <div class="form-group">
              <label class="form-label">이메일</label>
              <input type="email" class="form-control" id="am-email" placeholder="(optional)">
            </div>
            <div class="form-group">
              <label class="form-label">은행명</label>
              <select class="form-control" id="am-bank">
                <option value="">은행 선택</option>
                <option>국민은행</option><option>신한은행</option><option>우리은행</option>
                <option>하나은행</option><option>농협은행</option><option>기업은행</option>
                <option>SC제일은행</option><option>카카오백크</option><option>토스뱅크</option>
                <option>케이뱅크</option><option>새마을금고</option><option>수협은행</option>
                <option>우체국</option><option>씨티은행</option><option>기타</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">계좌번호</label>
              <input type="text" class="form-control" id="am-account" placeholder="- 없이 입력">
            </div>
            <div class="form-group">
              <label class="form-label">예금주 성명</label>
              <input type="text" class="form-control" id="am-holder" placeholder="예금주 이름">
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
            <div class="form-group">
              <label class="form-label">직급</label>
              <select class="form-control" id="am-rank">
                <option value="일반회원">일반회원</option>
                <option value="팀장">팀장</option>
                <option value="본부장">본부장</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">상태</label>
              <select class="form-control" id="am-status">
                <option value="active">활성 (즉시승인)</option>
                <option value="inactive">대기</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:12px;">
            <label class="form-label">추천인 검색 (선택)</label>
            <div style="display:flex;gap:8px;">
              <input type="text" class="form-control" id="am-recommender-input" placeholder="아이디 또는 이름 검색 (2자 이상)" oninput="searchAdminRecommender()">
              <input type="hidden" id="am-recommender-id">
            </div>
            <div id="am-recommender-result" style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;margin-top:4px;display:none;max-height:160px;overflow-y:auto;"></div>
            <div id="am-recommender-selected" style="display:none;margin-top:6px;padding:8px 12px;background:rgba(212,160,23,0.1);border:1px solid rgba(212,160,23,0.3);border-radius:8px;font-size:13px;">
              ✓ <span id="am-recommender-text"></span>
              <span onclick="clearAdminRecommender()" style="cursor:pointer;margin-left:8px;color:var(--text-muted);"><i class="fas fa-times"></i></span>
            </div>
          </div>
          <div id="add-member-error" style="display:none;padding:10px;background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);border-radius:8px;font-size:13px;color:#e74c3c;margin-bottom:12px;"></div>
          <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button type="button" class="btn btn-outline" onclick="closeModal('modal-add-member')">취소</button>
            <button type="submit" class="btn btn-gold" id="add-member-submit-btn">
              <i class="fas fa-user-plus"></i> 회원 등록
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal-member-detail">
    <div class="modal" style="max-width:580px;">
      <div class="modal-header">
        <span class="modal-title"><i class="fas fa-user-circle" style="color:var(--accent-gold);margin-right:8px;"></i> 회원 상세 정보</span>
        <button class="modal-close" onclick="closeModal('modal-member-detail')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="member-detail-body"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('modal-member-detail')">닫기</button>
        <button class="btn btn-gold" onclick="saveRankChange()"><i class="fas fa-save"></i> 저장</button>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script>
    if (!requireAdminAuth()) { /* redirect */ }
    function doLogout() { Auth.clear(); window.location.href = '../index.html'; }

    let currentPage = 1;
    let totalCount  = 0;
    const PAGE_LIMIT = 10;
    let detailMemberId = null;
    let detailMemberData = null;

    document.addEventListener('DOMContentLoaded', () => {
      applyTheme(getTheme());
      loadMembers();
    });

    async function loadMembers() {
      const q      = document.getElementById('search-input').value.trim();
      const rank   = document.getElementById('filter-rank').value;
      const status = document.getElementById('filter-status').value;

      const params = { page: currentPage, limit: PAGE_LIMIT };
      if (q)      params.search = q;
      if (rank)   params.rank   = rank;
      if (status) params.status = status;

      try {
        const data = await MembersAPI.list(params);
        totalCount = data.total || 0;
        renderTable(data.data || []);

        // 통계 업데이트
        const s = data.stats || {};
        ['total','active_count','inactive_count','teamjang_count','bonbujang_count'].forEach(k => {
          const el = document.getElementById('stat-' + k.replace('_count',''));
          if (el) el.textContent = s[k] || 0;
        });
      } catch(err) {
        showToast('회원 목록 로드 실패: ' + err.message, 'error');
      }
    }

    function filterMembers() {
      currentPage = 1;
      loadMembers();
    }

    function clearFilters() {
      document.getElementById('search-input').value = '';
      document.getElementById('filter-rank').value = '';
      document.getElementById('filter-status').value = '';
      currentPage = 1;
      loadMembers();
    }

    function renderTable(members) {
      const tbody = document.getElementById('members-tbody');
      if (members.length === 0) {
        tbody.innerHTML = `<tr><td colspan="12" style="text-align:center;padding:24px;color:var(--text-muted);">검색 결과가 없습니다.</td></tr>`;
      } else {
        tbody.innerHTML = members.map(m => `
          <tr>
            <td style="color:var(--text-muted);font-size:11px;">#${m.id}</td>
            <td>
              <div class="member-cell">
                <div style="width:30px;height:30px;border-radius:50%;background:var(--gradient-gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#1a1a2e;flex-shrink:0;">${(m.name||'?')[0]}</div>
                <span style="font-weight:700;">${m.user_id}</span>
              </div>
            </td>
            <td>${m.name}</td>
            <td style="font-size:12px;">${m.phone}</td>
            <td style="font-size:12px;">${m.bank_name||'-'}<br><span style="color:var(--text-muted);">${m.account_number||'-'}</span></td>
            <td>
              <select class="rank-select" onchange="changeRank(${m.id}, this.value)" title="직급 변경">
                <option ${m.rank==='일반회원'?'selected':''}>일반회원</option>
                <option ${m.rank==='팀장'?'selected':''}>팀장</option>
                <option ${m.rank==='본부장'?'selected':''}>본부장</option>
              </select>
            </td>
            <td style="font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--accent-gold);">
              ${formatMoney(m.investment_total || m.total_invested || 0)}
            </td>
            <td><span class="badge badge-blue">${m.current_week || 0}주차</span></td>
            <td style="font-size:12px;">${formatMoney(m.remaining_amount || 0)}</td>
            <td style="font-size:11px;color:var(--text-muted);">${formatDate(m.created_at)}</td>
            <td>${statusBadge(m.status)}</td>
            <td>
              <div style="display:flex;gap:4px;flex-wrap:wrap;">
                <button class="btn btn-outline btn-sm" style="padding:4px 8px;" onclick="viewMember(${m.id})" title="상세">
                  <i class="fas fa-eye"></i>
                </button>
                <button class="btn btn-sm" style="padding:4px 8px;background:rgba(155,89,182,0.2);border:1px solid rgba(155,89,182,0.5);color:#9b59b6;" onclick="changePasswordModal(${m.id}, '${m.user_id}', '${m.name}')" title="비밀번호 변경">
                  <i class="fas fa-key"></i>
                </button>
                ${m.status === 'inactive' ? `
                <button class="btn btn-success btn-sm" style="padding:4px 8px;" onclick="activateMember(${m.id})" title="활성화">
                  <i class="fas fa-check"></i>
                </button>` : `
                <button class="btn btn-danger btn-sm" style="padding:4px 8px;" onclick="suspendMember(${m.id})" title="정지">
                  <i class="fas fa-ban"></i>
                </button>`}
              </div>
            </td>
          </tr>
        `).join('');
      }

      renderPagination('members-pagination', totalCount, currentPage, PAGE_LIMIT,
        `function(p){ currentPage=p; loadMembers(); }`);
    }

    async function viewMember(id) {
      detailMemberId = id;
      try {
        const m = await MembersAPI.get(id);
        detailMemberData = m;
        const inv = (m.investments || [])[0] || {};

        document.getElementById('member-detail-body').innerHTML = `
          <div style="display:grid;gap:10px;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
              <div style="padding:12px;background:var(--bg-primary);border-radius:var(--radius-md);">
                <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">아이디</div>
                <div style="font-weight:700;">${m.user_id}</div>
              </div>
              <div style="padding:12px;background:var(--bg-primary);border-radius:var(--radius-md);">
                <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">이름</div>
                <div style="font-weight:700;">${m.name}</div>
              </div>
              <div style="padding:12px;background:var(--bg-primary);border-radius:var(--radius-md);">
                <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">전화번호</div>
                <div style="font-weight:700;">${m.phone}</div>
              </div>
              <div style="padding:12px;background:var(--bg-primary);border-radius:var(--radius-md);">
                <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">가입일</div>
                <div style="font-weight:700;">${formatDate(m.created_at)}</div>
              </div>
              <div style="padding:12px;background:var(--bg-primary);border-radius:var(--radius-md);">
                <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">은행 / 계좌번호</div>
                <div style="font-weight:700;">${m.bank_name||'-'} ${m.account_number||''}</div>
              </div>
              <div style="padding:12px;background:var(--bg-primary);border-radius:var(--radius-md);">
                <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">상태</div>
                ${statusBadge(m.status)}
              </div>
            </div>
            <div style="padding:16px;background:rgba(212,160,23,0.05);border:1px solid rgba(212,160,23,0.2);border-radius:var(--radius-md);">
              <div style="font-size:12px;font-weight:700;color:var(--accent-gold);margin-bottom:10px;">💰 투자 현황</div>
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center;">
                <div><div style="font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:var(--accent-gold);">${formatMoney(m.investment_total||0)}</div><div style="font-size:11px;color:var(--text-muted);">투자금</div></div>
                <div><div style="font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;">${inv.current_week||0}/15주</div><div style="font-size:11px;color:var(--text-muted);">진행 주차</div></div>
                <div><div style="font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:var(--accent-green);">${formatMoney(inv.remaining_amount||0)}</div><div style="font-size:11px;color:var(--text-muted);">잔여 지급액</div></div>
              </div>
              <div style="margin-top:12px;">${renderWeekProgress(inv.current_week||0, 15)}</div>
            </div>
            <div style="padding:12px;background:var(--bg-primary);border-radius:var(--radius-md);">
              <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">직급 변경</div>
              <select class="form-control" id="detail-rank-select" style="max-width:200px;">
                <option ${m.rank==='일반회원'?'selected':''}>일반회원</option>
                <option ${m.rank==='팀장'?'selected':''}>팀장</option>
                <option ${m.rank==='본부장'?'selected':''}>본부장</option>
              </select>
            </div>
            <div style="padding:12px;background:var(--bg-primary);border-radius:var(--radius-md);">
              <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">메모</div>
              <textarea class="form-control" id="detail-memo" rows="2" style="resize:none;">${m.memo||''}</textarea>
            </div>
          </div>
        `;
        openModal('modal-member-detail');
      } catch(err) {
        showToast('회원 정보 로드 실패: ' + err.message, 'error');
      }
    }

    async function saveRankChange() {
      const sel  = document.getElementById('detail-rank-select');
      const memo = document.getElementById('detail-memo')?.value || '';
      if (!sel || !detailMemberId) return;
      try {
        await MembersAPI.update(detailMemberId, { rank: sel.value, memo });
        showToast(`직급이 [${sel.value}]으로 변경되었습니다.`, 'success');
        closeModal('modal-member-detail');
        loadMembers();
      } catch(err) { showToast(err.message, 'error'); }
    }

    async function changeRank(id, newRank) {
      try {
        await MembersAPI.update(id, { rank: newRank });
        showToast(`직급 변경: ${newRank}`, 'success');
      } catch(err) { showToast(err.message, 'error'); }
    }

    async function activateMember(id) {
      try {
        await MembersAPI.update(id, { status: 'active' });
        showToast('회원 활성화 완료', 'success');
        loadMembers();
      } catch(err) { showToast(err.message, 'error'); }
    }

    async function suspendMember(id) {
      try {
        await MembersAPI.update(id, { status: 'suspended' });
        showToast('회원 정지 처리', 'warning');
        loadMembers();
      } catch(err) { showToast(err.message, 'error'); }
    }

    function exportCSV() {
      showToast('CSV 내보내기 기능은 추후 업데이트 예정입니다.', 'info');
    }

    // ── 비밀번호 변경 모달 ────────────────────────────────────
    function changePasswordModal(id, userId, name) {
      const html = `
        <div id="pw-modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;">
          <div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:16px;padding:28px;width:90%;max-width:420px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
              <h3 style="font-size:16px;font-weight:700;">🔑 비밀번호 변경</h3>
              <button onclick="document.getElementById('pw-modal').remove()" style="background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;">✕</button>
            </div>
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
              <strong style="color:var(--text-primary);">${name} (${userId})</strong> 회원의 비밀번호를 변경합니다.
            </p>
            <div style="margin-bottom:16px;">
              <label style="font-size:12px;font-weight:600;display:block;margin-bottom:6px;">새 비밀번호 <span style="color:#e74c3c;">*</span></label>
              <input type="password" id="new-pw-input" placeholder="6자 이상 입력"
                style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-primary);color:var(--text-primary);font-size:14px;box-sizing:border-box;" />
            </div>
            <div style="margin-bottom:20px;">
              <label style="font-size:12px;font-weight:600;display:block;margin-bottom:6px;">비밀번호 확인 <span style="color:#e74c3c;">*</span></label>
              <input type="password" id="new-pw-confirm" placeholder="비밀번호 재입력"
                style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-primary);color:var(--text-primary);font-size:14px;box-sizing:border-box;" />
            </div>
            <div style="display:flex;gap:8px;">
              <button onclick="document.getElementById('pw-modal').remove()"
                style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border-color);background:transparent;color:var(--text-primary);cursor:pointer;font-size:13px;">
                취소
              </button>
              <button onclick="submitPasswordChange(${id})"
                style="flex:1;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#9b59b6,#6c3483);color:#fff;cursor:pointer;font-size:13px;font-weight:700;">
                🔑 변경하기
              </button>
            </div>
          </div>
        </div>`;
      document.body.insertAdjacentHTML('beforeend', html);
      setTimeout(() => document.getElementById('new-pw-input')?.focus(), 100);
    }

    // ── 관리자 회원 추가 ─────────────────────────────────────
    let _amSearchTimer = null;
    function searchAdminRecommender() {
      const q = document.getElementById('am-recommender-input').value.trim();
      const resultEl = document.getElementById('am-recommender-result');
      if (!q || q.length < 2) { resultEl.style.display = 'none'; return; }
      clearTimeout(_amSearchTimer);
      _amSearchTimer = setTimeout(async () => {
        try {
          const token = Auth.getToken();
          const res = await fetch(`/api/auth/members/search?q=${encodeURIComponent(q)}`, {
            headers: token ? { Authorization: `Bearer ${token}` } : {}
          });
          const found = await res.json();
          if (!Array.isArray(found) || found.length === 0) {
            resultEl.innerHTML = `<div style="padding:10px;font-size:13px;color:var(--text-muted);">검색 결과 없음</div>`;
          } else {
            resultEl.innerHTML = found.map(m => `
              <div onclick="selectAdminRecommender('${m.id}','${m.user_id}','${m.name}','${m.rank}')"
                style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border-color);font-size:13px;display:flex;justify-content:space-between;"
                onmouseover="this.style.background='rgba(212,160,23,0.1)'" onmouseout="this.style.background=''">
                <span style="font-weight:700;">${m.user_id}</span>
                <span style="color:var(--text-muted);">${m.name} · ${m.rank}</span>
              </div>
            `).join('');
          }
          resultEl.style.display = 'block';
        } catch { resultEl.style.display = 'none'; }
      }, 300);
    }

    function selectAdminRecommender(id, userId, name, rank) {
      document.getElementById('am-recommender-id').value = userId; // user_id로 API 전달
      document.getElementById('am-recommender-input').value = userId;
      document.getElementById('am-recommender-result').style.display = 'none';
      document.getElementById('am-recommender-text').textContent = `${userId} (${name}) · ${rank}`;
      document.getElementById('am-recommender-selected').style.display = 'block';
    }

    function clearAdminRecommender() {
      document.getElementById('am-recommender-id').value = '';
      document.getElementById('am-recommender-input').value = '';
      document.getElementById('am-recommender-selected').style.display = 'none';
    }

    async function submitAddMember(e) {
      e.preventDefault();
      const errEl = document.getElementById('add-member-error');
      errEl.style.display = 'none';

      const body = {
        user_id:              document.getElementById('am-user-id').value.trim(),
        password:             document.getElementById('am-password').value,
        name:                 document.getElementById('am-name').value.trim(),
        phone:                document.getElementById('am-phone').value.trim(),
        email:                document.getElementById('am-email').value.trim() || undefined,
        bank_name:            document.getElementById('am-bank').value || undefined,
        account_number:       document.getElementById('am-account').value.trim() || undefined,
        account_holder:       document.getElementById('am-holder').value.trim() || undefined,
        recommender_user_id:  document.getElementById('am-recommender-id').value || undefined,
        rank:                 document.getElementById('am-rank').value,
        status:               document.getElementById('am-status').value,
      };

      const btn = document.getElementById('add-member-submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 처리 중...';

      try {
        const token = Auth.getToken();
        const res = await fetch('/api/admin/members', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '등록 실패');

        showToast(`${data.name}(${data.user_id}) 회원이 등록되었습니다.`, 'success');
        closeModal('modal-add-member');
        document.getElementById('add-member-form').reset();
        clearAdminRecommender();
        loadMembers();
      } catch(err) {
        errEl.textContent = '오류: ' + err.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> 회원 등록';
      }
    }
    // ─────────────────────────────────────────────────────────

    async function submitPasswordChange(memberId) {
      const pw  = document.getElementById('new-pw-input')?.value || '';
      const pw2 = document.getElementById('new-pw-confirm')?.value || '';
      if (!pw || pw.length < 6) { showToast('비밀번호는 6자 이상이어야 합니다.', 'error'); return; }
      if (pw !== pw2)           { showToast('비밀번호가 일치하지 않습니다.', 'error'); return; }

      try {
        const token = localStorage.getItem('dangun_token');
        const res = await fetch(`/api/members/${memberId}/password`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ new_password: pw })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '변경 실패');
        document.getElementById('pw-modal')?.remove();
        showToast(data.message || '비밀번호가 변경되었습니다.', 'success');
      } catch(err) {
        showToast('변경 실패: ' + err.message, 'error');
      }
    }
  </script>
</body>
</html>
